<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSLC Assignment Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg: #FAF8F5;
  --bg-card: #FFFFFF;
  --bg-sidebar: #1B2A22;
  --bg-sidebar-hover: #263D2F;
  --bg-sidebar-active: #2F4F3A;
  --text: #2C2C2C;
  --text-muted: #7A7A7A;
  --text-light: #A8A8A8;
  --text-sidebar: #C8D5CD;
  --text-sidebar-bright: #FFFFFF;
  --accent: #3A7D5C;
  --accent-light: #E8F5EE;
  --accent-hover: #2E6349;
  --border: #E8E4DF;
  --border-light: #F0ECE7;
  --red: #D94F4F;
  --red-light: #FDF0F0;
  --amber: #D4930D;
  --amber-light: #FFF8E7;
  --blue: #3B82C4;
  --blue-light: #EEF5FC;
  --green-status: #3A7D5C;
  --green-status-light: #E8F5EE;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.1);
  --radius: 10px;
  --radius-sm: 6px;
  --radius-lg: 14px;
  --font: 'DM Sans', sans-serif;
  --font-display: 'DM Serif Display', serif;
  --transition: 0.2s ease;
}

html { font-size: 15px; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  -webkit-font-smoothing: antialiased;
}

/* ─── SIDEBAR ─── */
.sidebar {
  width: 260px;
  min-height: 100vh;
  background: var(--bg-sidebar);
  padding: 28px 18px;
  display: flex;
  flex-direction: column;
  position: fixed;
  left: 0; top: 0; bottom: 0;
  z-index: 100;
  overflow-y: auto;
  transition: transform var(--transition);
}
.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 8px 24px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  margin-bottom: 24px;
}
.sidebar-brand-icon {
  width: 38px; height: 38px;
  background: var(--accent);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
}
.sidebar-brand h1 {
  font-family: var(--font-display);
  font-size: 1.15rem;
  color: var(--text-sidebar-bright);
  font-weight: 400;
  letter-spacing: 0.01em;
  line-height: 1.2;
}
.sidebar-brand small {
  font-family: var(--font);
  font-size: 0.7rem;
  color: var(--text-sidebar);
  font-weight: 400;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.sidebar-section-label {
  font-size: 0.65rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.3);
  padding: 0 10px;
  margin-bottom: 8px;
  margin-top: 8px;
}
.sidebar-nav { display: flex; flex-direction: column; gap: 2px; }
.sidebar-link {
  display: flex; align-items: center; gap: 11px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  color: var(--text-sidebar);
  text-decoration: none;
  font-size: 0.88rem;
  font-weight: 400;
  cursor: pointer;
  transition: all var(--transition);
  border: none; background: none; width: 100%; text-align: left;
}
.sidebar-link:hover { background: var(--bg-sidebar-hover); color: var(--text-sidebar-bright); }
.sidebar-link.active { background: var(--bg-sidebar-active); color: var(--text-sidebar-bright); font-weight: 500; }
.sidebar-link .icon { width: 20px; text-align: center; font-size: 1rem; flex-shrink: 0; }
.sidebar-spacer { flex: 1; }

/* ─── MAIN ─── */
.main {
  margin-left: 260px;
  flex: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ─── TOPBAR ─── */
.topbar {
  padding: 20px 36px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: var(--bg-card);
  position: sticky; top: 0;
  z-index: 50;
}
.topbar-left { display: flex; align-items: center; gap: 16px; }
.topbar-left h2 {
  font-family: var(--font-display);
  font-size: 1.45rem;
  font-weight: 400;
  color: var(--text);
}
.topbar-left .breadcrumb {
  font-size: 0.82rem;
  color: var(--text-muted);
}
.topbar-left .breadcrumb a {
  color: var(--accent);
  text-decoration: none;
  cursor: pointer;
}
.topbar-left .breadcrumb a:hover { text-decoration: underline; }
.topbar-right { display: flex; align-items: center; gap: 12px; }

.week-selector {
  display: flex; align-items: center; gap: 10px;
}
.week-selector label {
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.week-selector select {
  font-family: var(--font);
  font-size: 0.88rem;
  padding: 8px 32px 8px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  color: var(--text);
  cursor: pointer;
  appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%237A7A7A' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 12px center;
  min-width: 220px;
  transition: border-color var(--transition);
}
.week-selector select:focus { outline: none; border-color: var(--accent); }

/* ─── CONTENT ─── */
.content { padding: 32px 36px; flex: 1; }

/* ─── CARDS ─── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 22px;
  box-shadow: var(--shadow-sm);
}
.stat-card .label {
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.stat-card .value {
  font-family: var(--font-display);
  font-size: 1.8rem;
  color: var(--text);
  line-height: 1;
}
.stat-card .sub {
  font-size: 0.78rem;
  color: var(--text-light);
  margin-top: 6px;
}

/* ─── TABLE ─── */
.table-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.table-header {
  padding: 18px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-light);
}
.table-header h3 {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text);
}
.table-header .filters { display: flex; gap: 8px; }
.filter-btn {
  font-family: var(--font);
  font-size: 0.78rem;
  padding: 5px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--bg-card);
  color: var(--text-muted);
  cursor: pointer;
  transition: all var(--transition);
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

table { width: 100%; border-collapse: collapse; }
thead th {
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  padding: 12px 16px;
  text-align: left;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
}
tbody tr {
  border-bottom: 1px solid var(--border-light);
  transition: background var(--transition);
  cursor: pointer;
}
tbody tr:hover { background: var(--accent-light); }
tbody tr:last-child { border-bottom: none; }
tbody td {
  padding: 14px 16px;
  font-size: 0.88rem;
  vertical-align: middle;
}
.student-cell {
  display: flex; align-items: center; gap: 12px;
}
.student-emoji {
  width: 36px; height: 36px;
  background: var(--accent-light);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.15rem;
  flex-shrink: 0;
}
.student-name { font-weight: 500; }
.student-id {
  font-size: 0.75rem;
  color: var(--text-light);
}

/* ─── STATUS BADGES ─── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.76rem;
  font-weight: 500;
  white-space: nowrap;
}
.badge-present { background: var(--green-status-light); color: var(--green-status); }
.badge-absent { background: var(--red-light); color: var(--red); }
.badge-late { background: var(--amber-light); color: var(--amber); }
.badge-excused { background: var(--blue-light); color: var(--blue); }
.badge-none { background: var(--bg); color: var(--text-light); }
.badge-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
}

/* ─── STUDENT DETAIL VIEW ─── */
.student-hero {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-bottom: 32px;
}
.student-hero-emoji {
  width: 72px; height: 72px;
  background: var(--accent-light);
  border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  font-size: 2.4rem;
}
.student-hero-info h2 {
  font-family: var(--font-display);
  font-size: 1.6rem;
  font-weight: 400;
  margin-bottom: 4px;
}
.student-hero-info p {
  font-size: 0.88rem;
  color: var(--text-muted);
}

.tab-bar {
  display: flex;
  gap: 0;
  border-bottom: 2px solid var(--border);
  margin-bottom: 24px;
}
.tab-btn {
  font-family: var(--font);
  font-size: 0.85rem;
  font-weight: 500;
  padding: 12px 20px;
  border: none;
  background: none;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all var(--transition);
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

.report-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.report-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow-sm);
  transition: all var(--transition);
}
.report-card:hover {
  box-shadow: var(--shadow-md);
  border-color: var(--accent);
  transform: translateY(-2px);
}
.report-card h4 {
  font-size: 0.92rem;
  font-weight: 600;
  margin-bottom: 6px;
}
.report-card p {
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-bottom: 14px;
  line-height: 1.5;
}
.report-card .btn-row { display: flex; gap: 8px; }

/* ─── BUTTONS ─── */
.btn {
  font-family: var(--font);
  font-size: 0.8rem;
  font-weight: 500;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all var(--transition);
  text-decoration: none;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn-primary {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.btn-primary:hover { background: var(--accent-hover); color: white; }
.btn-sm { padding: 5px 12px; font-size: 0.76rem; }
.btn-icon {
  width: 36px; height: 36px;
  padding: 0;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm);
}

/* ─── MODAL ─── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 200;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  width: 90%;
  max-width: 780px;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-lg);
  animation: modalIn 0.25s ease;
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(16px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.modal-head {
  padding: 22px 28px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-head h3 {
  font-size: 1.1rem;
  font-weight: 600;
}
.modal-body {
  padding: 24px 28px;
  overflow-y: auto;
  flex: 1;
}
.modal-foot {
  padding: 16px 28px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}
.close-btn {
  width: 32px; height: 32px;
  border: none; background: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  font-size: 1.2rem;
  transition: all var(--transition);
}
.close-btn:hover { background: var(--bg); color: var(--text); }

/* ─── CALENDAR TABLE ─── */
.cal-table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
.cal-table th {
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  padding: 10px 14px;
  text-align: left;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.cal-table td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border-light);
}
.cal-table tr.current-week { background: var(--accent-light); }
.cal-table tr.inactive-week { opacity: 0.45; }
.cal-active-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
}
.cal-active-dot.on { background: var(--green-status); }
.cal-active-dot.off { background: var(--red); }

/* ─── LOADING ─── */
.loader {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 0;
  gap: 16px;
  color: var(--text-muted);
  font-size: 0.88rem;
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── EMPTY STATE ─── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
.empty-state p { font-size: 0.88rem; }

/* ─── CHECKIN HISTORY TABLE ─── */
.history-table { margin-top: 8px; }

/* ─── MOBILE MENU ─── */
.mobile-menu-btn {
  display: none;
  width: 40px; height: 40px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  cursor: pointer;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
}

/* ─── RESPONSIVE ─── */
@media (max-width: 860px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .mobile-menu-btn { display: flex; }
  .content { padding: 24px 18px; }
  .topbar { padding: 14px 18px; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 540px) {
  .stats-row { grid-template-columns: 1fr; }
  .week-selector select { min-width: 160px; }
}

/* ─── TOAST ─── */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--bg-sidebar);
  color: white;
  padding: 14px 22px;
  border-radius: var(--radius);
  font-size: 0.85rem;
  box-shadow: var(--shadow-lg);
  z-index: 300;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
}
@keyframes toastIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-light); }

/* ─── PRINT HIDE ─── */
@media print { .sidebar, .topbar { display: none; } .main { margin-left: 0; } }
</style>
</head>
<body>

<!-- ═══════ SIDEBAR ═══════ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="sidebar-brand-icon">&#x1F4DA;</div>
    <div>
      <h1>Assignment Tracker</h1>
      <small>MSLC</small>
    </div>
  </div>

  <div class="sidebar-section-label">Navigation</div>
  <nav class="sidebar-nav">
    <button class="sidebar-link active" onclick="navigate('dashboard')">
      <span class="icon">&#x1F3E0;</span> Dashboard
    </button>
  </nav>

  <div class="sidebar-section-label" style="margin-top:20px">Students</div>
  <nav class="sidebar-nav" id="sidebar-students">
    <!-- populated dynamically -->
  </nav>

  <div class="sidebar-spacer"></div>

  <div class="sidebar-section-label">Settings</div>
  <nav class="sidebar-nav">
    <button class="sidebar-link" onclick="openCalendarModal()">
      <span class="icon">&#x1F4C5;</span> Calendar Setup
    </button>
  </nav>
</aside>

<!-- ═══════ MAIN ═══════ -->
<div class="main">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="mobile-menu-btn" onclick="toggleSidebar()">&#x2630;</button>
      <div>
        <div class="breadcrumb" id="breadcrumb"></div>
        <h2 id="page-title">Dashboard</h2>
      </div>
    </div>
    <div class="topbar-right">
      <div class="week-selector" id="week-selector-container">
        <label>Week</label>
        <select id="week-select" onchange="onWeekChange()"></select>
      </div>
    </div>
  </header>

  <!-- CONTENT -->
  <div class="content" id="content">
    <div class="loader" id="initial-loader">
      <div class="spinner"></div>
      Loading tracker data&hellip;
    </div>
  </div>
</div>

<!-- ═══════ CALENDAR MODAL ═══════ -->
<div class="modal-overlay" id="calendar-modal">
  <div class="modal">
    <div class="modal-head">
      <h3>&#x1F4C5; Calendar Setup</h3>
      <button class="close-btn" onclick="closeCalendarModal()">&times;</button>
    </div>
    <div class="modal-body" id="calendar-modal-body">
      <div class="loader"><div class="spinner"></div>Loading calendar&hellip;</div>
    </div>
    <div class="modal-foot">
      <span style="font-size:0.78rem;color:var(--text-muted);margin-right:auto;">
        &#x1F512; Calendar is managed in Google Sheets
      </span>
      <button class="btn" onclick="closeCalendarModal()">Close</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  CONFIG & STATE
// ═══════════════════════════════════════════
const API = 'https://script.google.com/macros/s/AKfycbzr2z1ERKXAzYfyF2Ex3MQNjTEs-g6AxhmhfTZyhrkiz3znfjyuitERlpOKyzvR-fas/exec';

const state = {
  students: [],
  checkIns: [],
  calendar: [],
  currentWeekIdx: -1,
  currentView: 'dashboard',
  currentStudentId: null,
  studentTab: 'history',
  filter: 'all'
};

// ═══════════════════════════════════════════
//  EMOJI FIX — decode surrogate pair escapes
// ═══════════════════════════════════════════
function fixEmoji(str) {
  if (!str) return '';
  // If it's already a proper emoji, return it
  // Fix JSON-escaped surrogate pairs like \uD83D\uDE00
  try {
    if (str.includes('\\u')) {
      str = JSON.parse('"' + str.replace(/"/g, '\\"') + '"');
    }
  } catch(e) { /* ignore */ }
  return str;
}

// ═══════════════════════════════════════════
//  API HELPERS
// ═══════════════════════════════════════════
async function apiFetch(action) {
  const url = `${API}?action=${action}`;
  // Google Apps Script redirects (302) to googleusercontent.com;
  // redirect:'follow' (default) handles this, but be explicit.
  const resp = await fetch(url, { redirect: 'follow' });
  if (!resp.ok) throw new Error(`API ${action} failed: ${resp.status}`);
  const text = await resp.text();
  try {
    return JSON.parse(text);
  } catch(e) {
    console.error(`API ${action} returned non-JSON:`, text.substring(0, 200));
    throw new Error(`API ${action} returned invalid JSON`);
  }
}

function isSandboxed() {
  try {
    // Claude artifact preview & similar sandboxes block fetch entirely
    return window.self !== window.top ||
           location.protocol === 'data:' ||
           location.hostname === '' ||
           document.domain === '';
  } catch(e) { return true; }
}

async function loadAllData() {
  // Detect sandbox environment (e.g. Claude artifact preview)
  if (isSandboxed() && !location.hostname.includes('github.io')) {
    document.getElementById('content').innerHTML = `
      <div class="empty-state">
        <div class="icon">&#x1F6A7;</div>
        <p style="font-size:1rem;font-weight:500;margin-bottom:8px">Preview Mode</p>
        <p>This page needs to run on <strong>GitHub Pages</strong> to connect to the Google Sheets API.</p>
        <p style="margin-top:6px">Deploy this file to <code>canaanzheng-bot.github.io/assignment-tracker/</code></p>
        <a href="https://canaanzheng-bot.github.io/assignment-tracker/" class="btn btn-primary" style="margin-top:20px" target="_blank">
          Open Live Site &#x2192;
        </a>
      </div>`;
    return;
  }

  try {
    const [studentsRes, checkInsRes, calendarRes] = await Promise.all([
      apiFetch('getStudents'),
      apiFetch('getCheckIns'),
      apiFetch('getCalendar')
    ]);

    // Handle various response shapes flexibly
    state.students = studentsRes.students || studentsRes.data || studentsRes || [];
    state.checkIns = checkInsRes.checkIns || checkInsRes.data || checkInsRes || [];
    state.calendar = calendarRes.calendar || calendarRes.data || calendarRes || [];

    // Ensure arrays
    if (!Array.isArray(state.students)) state.students = [];
    if (!Array.isArray(state.checkIns)) state.checkIns = [];
    if (!Array.isArray(state.calendar)) state.calendar = [];

    // Fix emoji in student data
    state.students.forEach(s => {
      if (s.emoji) s.emoji = fixEmoji(s.emoji);
      if (s.icon) s.icon = fixEmoji(s.icon);
    });

    populateWeekSelector();
    populateSidebar();
    renderCurrentView();
  } catch(err) {
    console.error('Load error:', err);
    const isCors = err.message.includes('Failed to fetch') || err.message.includes('NetworkError');
    document.getElementById('content').innerHTML = `
      <div class="empty-state">
        <div class="icon">&#x26A0;&#xFE0F;</div>
        <p>Failed to load data.</p>
        ${isCors ? `
          <p style="font-size:0.82rem;color:var(--text-muted);margin-top:8px;max-width:420px;margin-left:auto;margin-right:auto">
            Network request blocked. If you're previewing this locally, try deploying to GitHub Pages or opening from <code>localhost</code> instead.
          </p>
        ` : ''}
        <p style="font-size:0.75rem;color:var(--text-light);margin-top:8px">${escapeHtml(err.message)}</p>
        <button class="btn btn-primary" style="margin-top:16px" onclick="location.reload()">Retry</button>
      </div>`;
  }
}

// ═══════════════════════════════════════════
//  WEEK SELECTOR
// ═══════════════════════════════════════════
function populateWeekSelector() {
  const sel = document.getElementById('week-select');
  sel.innerHTML = '';

  const today = new Date();
  today.setHours(0,0,0,0);
  let bestIdx = -1;
  let bestDiff = Infinity;

  state.calendar.forEach((w, i) => {
    const opt = document.createElement('option');
    opt.value = i;

    const label = w.label || w.weekLabel || `Week ${i + 1}`;
    const dateStr = w.mondayDate || w.monday || w.date || '';
    const displayDate = dateStr ? formatWeekDate(dateStr) : '';
    opt.textContent = displayDate ? `${label} — ${displayDate}` : label;

    if (!w.active && w.active !== undefined) {
      opt.disabled = false;  // still selectable, just dimmed
      opt.textContent += ' (inactive)';
    }

    sel.appendChild(opt);

    // Auto-select: find the week whose Monday is closest to today (on or before)
    if (dateStr) {
      const mon = parseDate(dateStr);
      if (mon) {
        const diff = today - mon;
        if (diff >= 0 && diff < bestDiff) {
          bestDiff = diff;
          bestIdx = i;
        }
      }
    }
  });

  // If we couldn't find a matching week, try by label containing "Mar 16" or similar
  if (bestIdx < 0) {
    state.calendar.forEach((w, i) => {
      const label = (w.label || '').toLowerCase();
      if (label.includes('unit 3') && label.includes('week 2')) {
        bestIdx = i;
      }
    });
  }

  if (bestIdx < 0 && state.calendar.length > 0) bestIdx = 0;

  state.currentWeekIdx = bestIdx;
  sel.value = bestIdx;
}

function parseDate(str) {
  if (!str) return null;
  // Handle various formats
  const d = new Date(str);
  if (!isNaN(d.getTime())) return d;
  // Try MM/DD/YYYY
  const parts = str.split('/');
  if (parts.length === 3) {
    return new Date(parts[2], parts[0] - 1, parts[1]);
  }
  return null;
}

function formatWeekDate(str) {
  const d = parseDate(str);
  if (!d) return str;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function onWeekChange() {
  state.currentWeekIdx = parseInt(document.getElementById('week-select').value);
  renderCurrentView();
}

function getCurrentWeekLabel() {
  if (state.currentWeekIdx < 0 || !state.calendar[state.currentWeekIdx]) return '';
  return state.calendar[state.currentWeekIdx].label || state.calendar[state.currentWeekIdx].weekLabel || '';
}

function getCurrentWeekDate() {
  if (state.currentWeekIdx < 0 || !state.calendar[state.currentWeekIdx]) return '';
  return state.calendar[state.currentWeekIdx].mondayDate || state.calendar[state.currentWeekIdx].monday || '';
}

// ═══════════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════════
function populateSidebar() {
  const nav = document.getElementById('sidebar-students');
  nav.innerHTML = '';
  state.students.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'sidebar-link';
    btn.dataset.id = s.id || s.studentId || s.name;
    const emoji = s.emoji || s.icon || '&#x1F9D1;';
    btn.innerHTML = `<span class="icon">${emoji}</span> ${escapeHtml(s.name || s.studentName || 'Student')}`;
    btn.onclick = () => navigate('student', s.id || s.studentId || s.name);
    nav.appendChild(btn);
  });
}

function updateSidebarActive() {
  document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active'));
  if (state.currentView === 'dashboard') {
    document.querySelector('.sidebar-link[onclick="navigate(\'dashboard\')"]')?.classList.add('active');
  } else if (state.currentView === 'student' && state.currentStudentId) {
    document.querySelector(`.sidebar-link[data-id="${state.currentStudentId}"]`)?.classList.add('active');
  }
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ═══════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════
function navigate(view, id) {
  state.currentView = view;
  state.currentStudentId = id || null;
  state.studentTab = 'history';
  state.filter = 'all';
  document.getElementById('sidebar').classList.remove('open');
  updateSidebarActive();
  renderCurrentView();
}

function renderCurrentView() {
  if (state.currentView === 'dashboard') {
    renderDashboard();
  } else if (state.currentView === 'student') {
    renderStudentDetail();
  }
}

// ═══════════════════════════════════════════
//  DASHBOARD VIEW
// ═══════════════════════════════════════════

  const weekDate = getCurrentWeekDate();

  // Compute stats
  const totalStudents = state.students.length;
  const present = weekCheckIns.filter(c => matchStatus(c, 'present')).length;
  const absent = weekCheckIns.filter(c => matchStatus(c, 'absent')).length;
  const late = weekCheckIns.filter(c => matchStatus(c, 'late')).length;
  const excused = weekCheckIns.filter(c => matchStatus(c, 'excused')).length;
  const checkedIn = weekCheckIns.length;
  const rate = totalStudents > 0 ? Math.round((present / totalStudents) * 100) : 0;

  let html = `
    <div class="stats-row">
      <div class="stat-card">
        <div class="label">Students</div>
        <div class="value">${totalStudents}</div>
        <div class="sub">Total enrolled</div>
      </div>
      <div class="stat-card">
        <div class="label">Present</div>
        <div class="value" style="color:var(--green-status)">${present}</div>
        <div class="sub">${weekLabel || 'this week'}</div>
      </div>
      <div class="stat-card">
        <div class="label">Absent</div>
        <div class="value" style="color:var(--red)">${absent}</div>
        <div class="sub">${late ? late + ' late, ' : ''}${excused ? excused + ' excused' : ''}</div>
      </div>
      <div class="stat-card">
        <div class="label">Attendance Rate</div>
        <div class="value">${rate}%</div>
        <div class="sub">Present / total</div>
      </div>
    </div>

    <div class="table-card">
      <div class="table-header">
        <h3>Student Check-Ins &#x2014; ${escapeHtml(weekLabel || 'All')}</h3>
        <div class="filters">
          <button class="filter-btn ${state.filter === 'all' ? 'active' : ''}" onclick="setFilter('all')">All</button>
          <button class="filter-btn ${state.filter === 'present' ? 'active' : ''}" onclick="setFilter('present')">Present</button>
          <button class="filter-btn ${state.filter === 'absent' ? 'active' : ''}" onclick="setFilter('absent')">Absent</button>
          <button class="filter-btn ${state.filter === 'late' ? 'active' : ''}" onclick="setFilter('late')">Late</button>
        </div>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>Student</th>
              <th>Status</th>
              <th>Assignment</th>
              <th>Notes</th>
              <th style="width:60px"></th>
            </tr>
          </thead>
          <tbody id="checkin-tbody">
          </tbody>
        </table>
      </div>
    </div>`;

  document.getElementById('content').innerHTML = html;
  renderCheckInRows();
}

function setFilter(f) {
  state.filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === f));
  renderCheckInRows();
}

function renderCheckInRows() {
  const tbody = document.getElementById('checkin-tbody');
  if (!tbody) return;

  const weekCheckIns = getCheckInsForWeek(state.currentWeekIdx);

  // Build rows for each student
  let rows = state.students.map(s => {
    const sid = s.id || s.studentId || s.name;
    const ci = weekCheckIns.find(c =>
      (c.studentId || c.student_id || c.id || c.studentName || c.name) === sid ||
      (c.studentName || c.name || c.student) === (s.name || s.studentName)
    );
    return { student: s, checkIn: ci, sid };
  });

  // Apply filter
  if (state.filter !== 'all') {
    rows = rows.filter(r => {
      if (!r.checkIn) return state.filter === 'absent';
      return matchStatus(r.checkIn, state.filter);
    });
  }

  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-muted)">No matching records</td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(r => {
    const s = r.student;
    const ci = r.checkIn;
    const emoji = s.emoji || s.icon || '&#x1F9D1;';
    const name = s.name || s.studentName || 'Student';
    const status = ci ? (ci.status || ci.checkInStatus || 'present') : 'none';
    const assignment = ci ? (ci.assignment || ci.assignmentStatus || ci.work || '') : '';
    const notes = ci ? (ci.notes || ci.comment || '') : '';

    return `
      <tr onclick="navigate('student', '${escapeAttr(r.sid)}')">
        <td>
          <div class="student-cell">
            <div class="student-emoji">${emoji}</div>
            <div>
              <div class="student-name">${escapeHtml(name)}</div>
              <div class="student-id">${escapeHtml(String(r.sid))}</div>
            </div>
          </div>
        </td>
        <td>${renderBadge(status)}</td>
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(assignment)}</td>
        <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-muted);font-size:0.82rem">${escapeHtml(notes)}</td>
        <td><span style="color:var(--text-light);font-size:0.9rem">&#x2192;</span></td>
      </tr>`;
  }).join('');
}

// ═══════════════════════════════════════════
//  STUDENT DETAIL VIEW
// ═══════════════════════════════════════════
function renderStudentDetail() {
  const s = state.students.find(st =>
    (st.id || st.studentId || st.name) === state.currentStudentId
  );
  if (!s) {
    navigate('dashboard');
    return;
  }

  const sid = s.id || s.studentId || s.name;
  const name = s.name || s.studentName || 'Student';
  const emoji = s.emoji || s.icon || '&#x1F9D1;';
  const grade = s.grade || s.level || '';
  const instrument = s.instrument || '';

  document.getElementById('page-title').textContent = name;
  document.getElementById('breadcrumb').innerHTML = `<a onclick="navigate('dashboard')">Dashboard</a> / ${escapeHtml(name)}`;
  document.getElementById('week-selector-container').style.display = 'none';

  // Get all check-ins for this student
  const allCI = state.checkIns.filter(c =>
    (c.studentId || c.student_id || c.id || c.studentName || c.name) === sid ||
    (c.studentName || c.name || c.student) === (s.name || s.studentName)
  );

  // Compute stats
  const totalWeeks = state.calendar.filter(w => w.active !== false).length || state.calendar.length;
  const presentCount = allCI.filter(c => matchStatus(c, 'present')).length;
  const absentCount = allCI.filter(c => matchStatus(c, 'absent')).length;
  const lateCount = allCI.filter(c => matchStatus(c, 'late')).length;
  const attendRate = totalWeeks > 0 ? Math.round((presentCount / totalWeeks) * 100) : 0;

  let html = `
    <div class="student-hero">
      <div class="student-hero-emoji">${emoji}</div>
      <div class="student-hero-info">
        <h2>${escapeHtml(name)}</h2>
        <p>${[grade, instrument].filter(Boolean).map(escapeHtml).join(' &middot; ') || 'Student'}</p>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="label">Attendance</div>
        <div class="value">${attendRate}%</div>
        <div class="sub">${presentCount} of ${totalWeeks} weeks present</div>
      </div>
      <div class="stat-card">
        <div class="label">Absent</div>
        <div class="value" style="color:var(--red)">${absentCount}</div>
        <div class="sub">${lateCount} late</div>
      </div>
      <div class="stat-card">
        <div class="label">Check-Ins</div>
        <div class="value">${allCI.length}</div>
        <div class="sub">Total recorded</div>
      </div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn ${state.studentTab === 'history' ? 'active' : ''}" onclick="switchStudentTab('history')">Check-In History</button>
      <button class="tab-btn ${state.studentTab === 'reports' ? 'active' : ''}" onclick="switchStudentTab('reports')">Reports</button>
    </div>

    <div id="student-tab-content"></div>`;

  document.getElementById('content').innerHTML = html;
  renderStudentTab(sid, s, allCI);
}

function switchStudentTab(tab) {
  state.studentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().includes(tab)));
  const s = state.students.find(st => (st.id || st.studentId || st.name) === state.currentStudentId);
  const sid = s ? (s.id || s.studentId || s.name) : '';
  const allCI = state.checkIns.filter(c =>
    (c.studentId || c.student_id || c.id || c.studentName || c.name) === sid ||
    (c.studentName || c.name || c.student) === (s?.name || s?.studentName || '')
  );
  renderStudentTab(sid, s, allCI);
}

function renderStudentTab(sid, student, allCI) {
  const container = document.getElementById('student-tab-content');
  if (!container) return;

  if (state.studentTab === 'history') {
    renderHistoryTab(container, allCI);
  } else {
    renderReportsTab(container, student, allCI);
  }
}

function renderHistoryTab(container, allCI) {
  if (allCI.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">&#x1F4CB;</div><p>No check-in records yet.</p></div>`;
    return;
  }

  // Map check-ins to calendar weeks
  const rows = state.calendar.map((w, i) => {
    const ci = allCI.find(c => {
      const cWeek = c.week || c.weekIndex || c.weekLabel || '';
      return String(cWeek) === String(i) || String(cWeek) === String(i + 1) ||
             cWeek === w.label || cWeek === (w.label || '').replace(/,.*/, '');
    });
    return { week: w, checkIn: ci, idx: i };
  }).reverse(); // most recent first

  container.innerHTML = `
    <div class="table-card history-table">
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>Week</th>
              <th>Date</th>
              <th>Status</th>
              <th>Assignment</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(r => {
              const label = r.week.label || r.week.weekLabel || `Week ${r.idx + 1}`;
              const date = formatWeekDate(r.week.mondayDate || r.week.monday || '');
              const status = r.checkIn ? (r.checkIn.status || r.checkIn.checkInStatus || 'present') : 'none';
              const assignment = r.checkIn ? (r.checkIn.assignment || r.checkIn.assignmentStatus || r.checkIn.work || '') : '';
              const notes = r.checkIn ? (r.checkIn.notes || r.checkIn.comment || '') : '';
              const isCurrent = r.idx === state.currentWeekIdx;
              return `
                <tr style="${isCurrent ? 'background:var(--accent-light)' : ''}">
                  <td style="font-weight:500">${escapeHtml(label)}${isCurrent ? ' <span style="font-size:0.7rem;color:var(--accent)">(current)</span>' : ''}</td>
                  <td style="color:var(--text-muted)">${escapeHtml(date)}</td>
                  <td>${renderBadge(status)}</td>
                  <td style="max-width:200px">${escapeHtml(assignment)}</td>
                  <td style="max-width:180px;color:var(--text-muted);font-size:0.82rem">${escapeHtml(notes)}</td>
                </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

function renderReportsTab(container, student, allCI) {
  const name = student?.name || student?.studentName || 'Student';

  // Build month groups from calendar
  const months = {};
  state.calendar.forEach((w, i) => {
    const d = parseDate(w.mondayDate || w.monday || '');
    if (d) {
      const key = d.toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
      if (!months[key]) months[key] = [];
      months[key].push(i);
    }
  });

  // Build unit groups
  const units = {};
  state.calendar.forEach((w, i) => {
    const label = w.label || w.weekLabel || '';
    const unitMatch = label.match(/unit\s*(\d+)/i);
    if (unitMatch) {
      const key = `Unit ${unitMatch[1]}`;
      if (!units[key]) units[key] = [];
      units[key].push(i);
    }
  });

  container.innerHTML = `
    <div class="report-grid">
      <!-- WEEKLY REPORT -->
      <div class="report-card">
        <h4>&#x1F4C4; Weekly Report</h4>
        <p>Generate a PDF report for any single week, including attendance status and assignment details.</p>
        <div style="margin-bottom:10px">
          <select id="report-week-select" style="font-family:var(--font);font-size:0.82rem;padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);width:100%">
            ${state.calendar.map((w, i) => `<option value="${i}" ${i === state.currentWeekIdx ? 'selected' : ''}>${escapeHtml(w.label || `Week ${i+1}`)} — ${formatWeekDate(w.mondayDate || w.monday || '')}</option>`).join('')}
          </select>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary btn-sm" onclick="generateWeeklyPDF('${escapeAttr(String(student?.id || student?.studentId || student?.name || ''))}')">
            &#x1F4E5; Download PDF
          </button>
        </div>
      </div>

      <!-- MONTHLY REPORT -->
      <div class="report-card">
        <h4>&#x1F4C5; Monthly Report</h4>
        <p>Summary of attendance and assignments for an entire calendar month.</p>
        <div style="margin-bottom:10px">
          <select id="report-month-select" style="font-family:var(--font);font-size:0.82rem;padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);width:100%">
            ${Object.keys(months).map(m => `<option value="${m}">${m}</option>`).join('')}
          </select>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary btn-sm" onclick="generateMonthlyPDF('${escapeAttr(String(student?.id || student?.studentId || student?.name || ''))}')">
            &#x1F4E5; Download PDF
          </button>
        </div>
      </div>

      <!-- UNIT REPORT -->
      <div class="report-card">
        <h4>&#x1F4DA; Unit Report</h4>
        <p>Comprehensive report covering all weeks within a curriculum unit.</p>
        <div style="margin-bottom:10px">
          <select id="report-unit-select" style="font-family:var(--font);font-size:0.82rem;padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);width:100%">
            ${Object.keys(units).map(u => `<option value="${u}">${u}</option>`).join('')}
          </select>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary btn-sm" onclick="generateUnitPDF('${escapeAttr(String(student?.id || student?.studentId || student?.name || ''))}')">
            &#x1F4E5; Download PDF
          </button>
        </div>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════
//  CHECK-IN HELPERS
// ═══════════════════════════════════════════
function getCheckInsForWeek(weekIdx) {
  if (weekIdx < 0 || !state.calendar[weekIdx]) return [];
  const w = state.calendar[weekIdx];
  const label = w.label || w.weekLabel || '';
  return state.checkIns.filter(c => {
    const cWeek = c.week ?? c.weekIndex ?? c.weekLabel ?? '';
    return String(cWeek) === String(weekIdx) ||
           String(cWeek) === String(weekIdx + 1) ||
           cWeek === label ||
           cWeek === label.replace(/,.*/, '');
  });
}

function matchStatus(ci, target) {
  const s = (ci.status || ci.checkInStatus || '').toLowerCase().trim();
  if (target === 'present') return s === 'present' || s === 'on time' || s === 'on-time' || s === 'checked in' || s === 'complete';
  if (target === 'absent') return s === 'absent' || s === 'no show' || s === 'no-show' || s === 'missing';
  if (target === 'late') return s === 'late' || s === 'tardy';
  if (target === 'excused') return s === 'excused' || s === 'excused absence';
  return s === target;
}

function renderBadge(status) {
  const s = status.toLowerCase().trim();
  let cls = 'badge-none', label = 'No Record';
  if (s === 'present' || s === 'on time' || s === 'on-time' || s === 'checked in' || s === 'complete') {
    cls = 'badge-present'; label = 'Present';
  } else if (s === 'absent' || s === 'no show' || s === 'no-show' || s === 'missing') {
    cls = 'badge-absent'; label = 'Absent';
  } else if (s === 'late' || s === 'tardy') {
    cls = 'badge-late'; label = 'Late';
  } else if (s === 'excused' || s === 'excused absence') {
    cls = 'badge-excused'; label = 'Excused';
  } else if (s && s !== 'none') {
    cls = 'badge-present'; label = status; // custom status
  }
  return `<span class="badge ${cls}"><span class="badge-dot"></span>${escapeHtml(label)}</span>`;
}

function openCalendarModal() {
  document.getElementById('calendar-modal').classList.add('open');
  renderCalendarModal();
}
function closeCalendarModal() {
  document.getElementById('calendar-modal').classList.remove('open');
}

function renderCalendarModal() {
  const body = document.getElementById('calendar-modal-body');
  if (state.calendar.length === 0) {
    body.innerHTML = `<div class="empty-state"><div class="icon">&#x1F4C5;</div><p>No calendar data loaded.</p></div>`;
    return;
  }

  const today = new Date(); today.setHours(0,0,0,0);

  body.innerHTML = `
    <p style="font-size:0.82rem;color:var(--text-muted);margin-bottom:16px">
      ${state.calendar.length} school weeks configured. The calendar is read-only here &mdash; edit in Google Sheets.
    </p>
    <table class="cal-table">
      <thead>
        <tr>
          <th style="width:40px">#</th>
          <th>Week Label</th>
          <th>Monday Date</th>
          <th style="width:70px">Active</th>
        </tr>
      </thead>
      <tbody>
        ${state.calendar.map((w, i) => {
          const label = w.label || w.weekLabel || `Week ${i + 1}`;
          const dateStr = w.mondayDate || w.monday || w.date || '';
          const mon = parseDate(dateStr);
          const formattedDate = mon ? mon.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : dateStr;
          const isCurrent = i === state.currentWeekIdx;
          const isActive = w.active !== false;
          return `
            <tr class="${isCurrent ? 'current-week' : ''} ${!isActive ? 'inactive-week' : ''}">
              <td style="color:var(--text-light);font-size:0.78rem">${i + 1}</td>
              <td style="font-weight:${isCurrent ? '600' : '400'}">${escapeHtml(label)}${isCurrent ? ' <span style="font-size:0.7rem;background:var(--accent);color:white;padding:2px 8px;border-radius:10px;margin-left:6px">NOW</span>' : ''}</td>
              <td>${escapeHtml(formattedDate)}</td>
              <td><span class="cal-active-dot ${isActive ? 'on' : 'off'}"></span> ${isActive ? 'Yes' : 'No'}</td>
            </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

// Close modal on overlay click
document.getElementById('calendar-modal').addEventListener('click', function(e) {

// ═══════════════════════════════════════════
//  PDF REPORT GENERATION
// ═══════════════════════════════════════════
function getStudentAndCheckIns(sid) {
  const s = state.students.find(st => String(st.id || st.studentId || st.name) === String(sid));
  if (!s) return { student: null, checkIns: [] };
  const name = s.name || s.studentName || '';
  const allCI = state.checkIns.filter(c =>
    String(c.studentId || c.student_id || c.id || c.studentName || c.name) === String(sid) ||
    (c.studentName || c.name || c.student) === name
  );
  return { student: s, checkIns: allCI };
}

function pdfHeader(doc, title, subtitle) {
  doc.setFillColor(27, 42, 34);
  doc.rect(0, 0, 210, 36, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(16);
  doc.setFont('helvetica', 'bold');
  doc.text('MSLC Assignment Tracker', 14, 16);
  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  doc.text(title, 14, 25);
  doc.setFontSize(8);
  doc.text(subtitle, 14, 31);
  doc.setTextColor(44, 44, 44);
  return 46;
}

function pdfStudentInfo(doc, student, y) {
  const name = student.name || student.studentName || 'Student';
  const grade = student.grade || student.level || '';
  const instrument = student.instrument || '';
  doc.setFontSize(12);
  doc.setFont('helvetica', 'bold');
  doc.text(name, 14, y);
  doc.setFontSize(9);
  doc.setFont('helvetica', 'normal');
  doc.setTextColor(122, 122, 122);
  doc.text([grade, instrument].filter(Boolean).join(' | '), 14, y + 6);
  doc.setTextColor(44, 44, 44);
  return y + 14;
}

function generateWeeklyPDF(sid) {
  const { student, checkIns } = getStudentAndCheckIns(sid);
  if (!student) return;

  const weekIdx = parseInt(document.getElementById('report-week-select')?.value ?? state.currentWeekIdx);
  const w = state.calendar[weekIdx];
  if (!w) return;

  const weekLabel = w.label || w.weekLabel || `Week ${weekIdx + 1}`;
  const weekDate = formatWeekDate(w.mondayDate || w.monday || '');
  const name = student.name || student.studentName || 'Student';

  const ci = checkIns.find(c => {
    const cw = c.week ?? c.weekIndex ?? c.weekLabel ?? '';
    return String(cw) === String(weekIdx) || String(cw) === String(weekIdx + 1) ||
           cw === (w.label || '') || cw === (w.label || '').replace(/,.*/, '');
  });

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = pdfHeader(doc, `Weekly Report: ${weekLabel}`, `Week of ${weekDate} | Generated ${new Date().toLocaleDateString()}`);
  y = pdfStudentInfo(doc, student, y);

  const status = ci ? (ci.status || ci.checkInStatus || 'Present') : 'No Record';
  const assignment = ci ? (ci.assignment || ci.assignmentStatus || ci.work || 'N/A') : 'N/A';
  const notes = ci ? (ci.notes || ci.comment || 'N/A') : 'N/A';

  doc.autoTable({
    startY: y,
    head: [['Field', 'Details']],
    body: [
      ['Week', weekLabel],
      ['Date', weekDate],
      ['Status', status],
      ['Assignment', assignment],
      ['Notes', notes]
    ],
    theme: 'striped',
    headStyles: { fillColor: [58, 125, 92], fontSize: 9, fontStyle: 'bold' },
    bodyStyles: { fontSize: 9 },
    margin: { left: 14, right: 14 }
  });

  doc.save(`${name.replace(/\s+/g, '_')}_Weekly_${weekLabel.replace(/[\s,]+/g, '_')}.pdf`);
  showToast('Weekly report downloaded');
}

function generateMonthlyPDF(sid) {
  const { student, checkIns } = getStudentAndCheckIns(sid);
  if (!student) return;

  const monthKey = document.getElementById('report-month-select')?.value;
  if (!monthKey) return;

  const name = student.name || student.studentName || 'Student';

  // Collect weeks in this month
  const weekIndices = [];
  state.calendar.forEach((w, i) => {
    const d = parseDate(w.mondayDate || w.monday || '');
    if (d) {
      const key = d.toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
      if (key === monthKey) weekIndices.push(i);
    }
  });

  const rows = weekIndices.map(i => {
    const w = state.calendar[i];
    const label = w.label || w.weekLabel || `Week ${i + 1}`;
    const date = formatWeekDate(w.mondayDate || w.monday || '');
    const ci = checkIns.find(c => {
      const cw = c.week ?? c.weekIndex ?? c.weekLabel ?? '';
      return String(cw) === String(i) || String(cw) === String(i + 1) ||
             cw === (w.label || '') || cw === (w.label || '').replace(/,.*/, '');
    });
    const status = ci ? (ci.status || ci.checkInStatus || 'Present') : 'No Record';
    const assignment = ci ? (ci.assignment || ci.assignmentStatus || ci.work || '') : '';
    const notes = ci ? (ci.notes || ci.comment || '') : '';
    return [label, date, status, assignment, notes];
  });

  const presentCount = rows.filter(r => ['present','on time','checked in','complete'].includes(r[2].toLowerCase())).length;
  const rate = weekIndices.length > 0 ? Math.round((presentCount / weekIndices.length) * 100) : 0;

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = pdfHeader(doc, `Monthly Report: ${monthKey}`, `${weekIndices.length} weeks | Generated ${new Date().toLocaleDateString()}`);
  y = pdfStudentInfo(doc, student, y);

  doc.setFontSize(10);
  doc.setFont('helvetica', 'bold');
  doc.text(`Attendance Rate: ${rate}%`, 14, y);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.text(`${presentCount} present out of ${weekIndices.length} weeks`, 14, y + 5);
  y += 12;

  doc.autoTable({
    startY: y,
    head: [['Week', 'Date', 'Status', 'Assignment', 'Notes']],
    body: rows,
    theme: 'striped',
    headStyles: { fillColor: [58, 125, 92], fontSize: 8, fontStyle: 'bold' },
    bodyStyles: { fontSize: 8 },
    columnStyles: {
      0: { cellWidth: 35 },
      1: { cellWidth: 22 },
      2: { cellWidth: 22 },
      3: { cellWidth: 50 },
      4: { cellWidth: 50 }
    },
    margin: { left: 14, right: 14 }
  });

  doc.save(`${name.replace(/\s+/g, '_')}_Monthly_${monthKey.replace(/\s+/g, '_')}.pdf`);
  showToast('Monthly report downloaded');
}

      0: { cellWidth: 35 },
      1: { cellWidth: 22 },
      2: { cellWidth: 22 },
      3: { cellWidth: 50 },
      4: { cellWidth: 50 }

  doc.save(`${name.replace(/\s+/g, '_')}_${unitKey.replace(/\s+/g, '_')}_Report.pdf`);

// ═══════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════
function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = String(str);
  return div.innerHTML;
}

function escapeAttr(str) {
  return String(str).replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function showToast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3200);
}
