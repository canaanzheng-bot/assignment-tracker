<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 Assignment Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(180deg,#F6F6FB 0%,#EDEDF5 100%);min-height:100vh}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.75}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.container{max-width:1140px;margin:0 auto;padding:32px 20px}
.skeleton{border-radius:8px;background:linear-gradient(90deg,#EEEEF2 25%,#F5F5F8 50%,#EEEEF2 75%);background-size:800px 100%;animation:shimmer 1.5s ease-in-out infinite}
.sk-title{height:32px;width:300px;margin-bottom:6px}.sk-subtitle{height:16px;width:220px;margin-bottom:24px}
.sk-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.sk-stat{height:80px;border-radius:14px}.sk-table{height:400px;border-radius:16px;margin-top:20px}.sk-daypicker{height:64px;border-radius:14px;margin-bottom:20px}
.app-content{animation:slideUp 0.4s ease}
.syncing-badge{position:fixed;top:16px;right:16px;z-index:999;display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:10px;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif;animation:fadeIn 0.2s;transition:opacity 0.3s}
.syncing-badge.saving{background:#FFF8EE;color:#B8600A;border:1.5px solid #FFE0B2}
.syncing-badge.saved{background:#E8F8EE;color:#1B7A3D;border:1.5px solid #B2F5C7}
.syncing-badge.error{background:#FFF0F0;color:#D5564F;border:1.5px solid #FFC7C7}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useMemo,useRef,useCallback} = React;

const API_URL = "https://script.google.com/macros/s/AKfycbzr2z1ERKXAzYfyF2Ex3MQNjTEs-g6AxhmhfTZyhrkiz3znfjyuitERlpOKyzvR-fas/exec";

const CATEGORIES=["Math","Chinese","Journal","Homework"];
const CATEGORY_ICONS={Math:"∑",Chinese:"字",Journal:"✎",Homework:"📋"};
const CATEGORY_COLORS={Math:{bg:"#EEF0FF",active:"#4F5BD5",border:"#C7CAFF"},Chinese:{bg:"#FFF0F0",active:"#D5564F",border:"#FFC7C7"},Journal:{bg:"#F0FFF4",active:"#38A169",border:"#B2F5C7"},Homework:{bg:"#FFF8EE",active:"#D5944F",border:"#FFE0B2"}};
const WEEKDAYS=["Mon","Tue","Wed","Thu","Fri"];

function getWeekKey(date=new Date()){const d=new Date(date);d.setHours(0,0,0,0);const day=d.getDay();d.setDate(d.getDate()-day+(day===0?-6:1));return d.toISOString().split("T")[0]}
function getDayKey(date=new Date()){return date.toISOString().split("T")[0]}
function getWeekDates(wk){const s=new Date(wk+"T00:00:00");return Array.from({length:5},(_,i)=>{const d=new Date(s);d.setDate(d.getDate()+i);return d.toISOString().split("T")[0]})}
function getWeekOffset(o){const d=new Date();d.setDate(d.getDate()+o*7);return getWeekKey(d)}
function isDayCompleted(cats){if(!cats)return false;return Object.values(cats).filter(Boolean).length>=3}
function isWeekCompletedFromDates(sr,wd){let c=0;for(const d of wd)if(isDayCompleted(sr?.[d]))c++;return c>=4}
function countCompletedDays(sr,wd){let c=0;for(const d of wd)if(isDayCompleted(sr?.[d]))c++;return c}

const ALERT_LEVELS={none:{color:"transparent",bg:"transparent",label:"",icon:"",border:"transparent"},yellow:{color:"#B8860B",bg:"#FFF8DC",border:"#FFE066",label:"Concern",icon:"⚠️"},red:{color:"#C0392B",bg:"#FFF0F0",border:"#FF8A8A",label:"At Risk",icon:"🔴"},purple:{color:"#6C3483",bg:"#F5EEFF",border:"#C39BFF",label:"Critical",icon:"🟣"}};
function getStudentAlerts(name,records){
  const sr=records[name]||{};const alerts=[];const today=new Date();const todayDay=today.getDay();
  const cwd=getWeekDates(getWeekKey(today));const cc=countCompletedDays(sr,cwd);
  const todayStr=getDayKey(today);const rem=cwd.filter(d=>d>=todayStr).length;const best=cc+rem;
  if(todayDay>=5&&cc<4)alerts.push({level:"yellow",message:`Only ${cc}/4 days this week`});
  else if(best<4&&todayDay>=1&&todayDay<=5)alerts.push({level:"yellow",message:`Can only reach ${best}/4 — at risk`});
  const wr=[];for(let i=0;i<4;i++){const ds=getWeekDates(getWeekOffset(-i));wr.push({isComplete:countCompletedDays(sr,ds)>=4})}
  const inc=wr.filter(w=>!w.isComplete).length;
  if(inc>=2)alerts.push({level:"red",message:`${inc}/4 weeks incomplete`});
  if(wr.length===4&&wr.every(w=>!w.isComplete))alerts.push({level:"purple",message:"4 weeks in a row"});
  return alerts;
}
function getHighestAlert(a){if(a.some(x=>x.level==="purple"))return"purple";if(a.some(x=>x.level==="red"))return"red";if(a.some(x=>x.level==="yellow"))return"yellow";return"none"}

async function apiGet(action){const res=await fetch(`${API_URL}?action=${action}`);return res.json()}
async function apiPost(data){const res=await fetch(API_URL,{method:"POST",body:JSON.stringify(data)});return res.json()}

function SkeletonScreen(){
  return <div className="container"><div style={{display:"flex",justifyContent:"space-between",marginBottom:28}}><div><div className="skeleton sk-title"/><div className="skeleton sk-subtitle"/></div></div>
    <div className="sk-stats"><div className="skeleton sk-stat"/><div className="skeleton sk-stat"/><div className="skeleton sk-stat"/><div className="skeleton sk-stat"/></div>
    <div className="skeleton sk-daypicker"/><div className="skeleton sk-table"/></div>;
}

/* ─── Shared Components ─── */
function CategoryButton({category,checked,onToggle,small}){const co=CATEGORY_COLORS[category];return <button onClick={onToggle} style={{display:"inline-flex",alignItems:"center",gap:small?4:6,padding:small?"4px 10px":"6px 14px",borderRadius:8,border:`2px solid ${checked?co.active:co.border}`,background:checked?co.active:co.bg,color:checked?"#fff":co.active,fontWeight:600,fontSize:small?12:13,cursor:"pointer",transition:"all 0.2s",fontFamily:"'DM Sans',sans-serif",boxShadow:checked?`0 2px 8px ${co.active}40`:"none"}}><span style={{fontSize:small?13:15}}>{checked?"✓":CATEGORY_ICONS[category]}</span>{category}</button>}
function StatusBadge({completed,label}){return <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:700,background:completed?"#E8F8EE":"#FFF3E6",color:completed?"#1B7A3D":"#B8600A",fontFamily:"'DM Sans',sans-serif",textTransform:"uppercase"}}><span style={{fontSize:8}}>{completed?"●":"○"}</span>{label}</span>}
function AlertBadge({level,compact}){if(level==="none")return null;const a=ALERT_LEVELS[level];return <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:compact?"2px 8px":"4px 12px",borderRadius:20,fontSize:compact?10:11,fontWeight:800,background:a.bg,color:a.color,border:`1.5px solid ${a.border}`,fontFamily:"'DM Sans',sans-serif",textTransform:"uppercase"}}><span style={{fontSize:compact?10:12}}>{a.icon}</span>{a.label}</span>}
function ProgressRing({value,max,size=65,strokeWidth=6,color="#4F5BD5"}){const r=(size-strokeWidth)/2;const c=2*Math.PI*r;const p=(value/max)*c;return <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#F0F0F5" strokeWidth={strokeWidth}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={strokeWidth} strokeDasharray={c} strokeDashoffset={c-p} strokeLinecap="round" style={{transition:"stroke-dashoffset 0.6s"}}/></svg>}
function WeekNavigator({weekOffset,setWeekOffset}){const ds=getWeekDates(getWeekOffset(weekOffset));const fmt=d=>new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});return <div style={{display:"flex",alignItems:"center",gap:12}}><button onClick={()=>setWeekOffset(weekOffset-1)} style={{width:32,height:32,borderRadius:"50%",border:"2px solid #E0E0E8",background:"#fff",cursor:"pointer",fontSize:14,color:"#666",display:"flex",alignItems:"center",justifyContent:"center"}}>◂</button><span style={{fontFamily:"'DM Sans',sans-serif",fontSize:14,fontWeight:600,color:"#444",minWidth:160,textAlign:"center"}}>{fmt(ds[0])} — {fmt(ds[4])}{weekOffset===0&&<span style={{color:"#4F5BD5",marginLeft:6,fontSize:11}}>THIS WEEK</span>}</span><button onClick={()=>setWeekOffset(weekOffset+1)} disabled={weekOffset>=0} style={{width:32,height:32,borderRadius:"50%",border:"2px solid #E0E0E8",background:"#fff",cursor:"pointer",fontSize:14,color:"#666",display:"flex",alignItems:"center",justifyContent:"center"}}>▸</button></div>}
function DayPicker({weekDates,selectedDay,onSelectDay,label}){const todayKey=getDayKey();return <div style={{background:"#fff",borderRadius:14,border:"1px solid #EEEEF2",padding:"12px 16px",marginBottom:20}}><div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:16}}>📅</span><span style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:700,color:"#666",textTransform:"uppercase"}}>{label||"Check-in for:"}</span></div><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{weekDates.map((ds,i)=>{const isToday=ds===todayKey;const isSel=ds===selectedDay;const isPast=ds<todayKey;const isFut=ds>todayKey;return <button key={ds} onClick={()=>onSelectDay(ds)} style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"8px 14px",borderRadius:10,cursor:"pointer",border:isSel?"2px solid #4F5BD5":"2px solid #E8E8EE",background:isSel?"linear-gradient(135deg,#4F5BD5,#7B68EE)":(isToday?"#F5F5FF":"#fff"),color:isSel?"#fff":(isFut?"#ccc":"#444"),fontFamily:"'DM Sans',sans-serif",opacity:isFut?0.5:1,minWidth:64,boxShadow:isSel?"0 3px 12px rgba(79,91,213,0.3)":"none",position:"relative"}}><span style={{fontSize:12,fontWeight:800}}>{WEEKDAYS[i]}</span><span style={{fontSize:10,fontWeight:500,marginTop:1,opacity:isSel?0.9:0.7}}>{new Date(ds+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>{isToday&&!isSel&&<div style={{position:"absolute",top:-3,right:-3,width:8,height:8,borderRadius:"50%",background:"#4F5BD5",border:"2px solid #fff"}}/>}{isPast&&!isSel&&!isToday&&<div style={{position:"absolute",bottom:-2,left:"50%",transform:"translateX(-50%)",fontSize:7,color:"#D5944F",fontWeight:800}}>CATCH UP</div>}</button>})}</div>{selectedDay!==todayKey&&<div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",borderRadius:8,background:"#FFF8EE",border:"1.5px solid #FFE0B2"}}><span style={{fontSize:12}}>⏪</span><span style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,fontWeight:700,color:"#B8600A"}}>Catch-Up: {new Date(selectedDay+"T00:00:00").toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"})}</span><button onClick={()=>onSelectDay(todayKey)} style={{background:"none",border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:11,fontWeight:700,color:"#4F5BD5",textDecoration:"underline",padding:0}}>→ Today</button></div>}</div></div>}
function SyncBadge({status}){if(!status)return null;const cls=status==="saving"?"saving":status==="saved"?"saved":"error";const txt=status==="saving"?"☁️ Saving...":status==="saved"?"✅ Synced":"❌ Sync error";return <div className={`syncing-badge ${cls}`}>{txt}</div>}

function AlertsSummaryPanel({students,records}){
  const allAlerts=useMemo(()=>{const res=[];for(const s of students.filter(s=>s.visible)){const a=getStudentAlerts(s.name,records);if(a.length>0)res.push({student:s,alerts:a,highest:getHighestAlert(a)})}const o={purple:0,red:1,yellow:2};res.sort((a,b)=>(o[a.highest]??9)-(o[b.highest]??9));return res},[students,records]);
  if(allAlerts.length===0)return null;
  return <div style={{background:"#fff",borderRadius:16,border:"1px solid #EEEEF2",overflow:"hidden",marginBottom:24}}>
    <div style={{padding:"14px 24px",borderBottom:"1px solid #EEEEF2",background:"linear-gradient(135deg,#FFFBF0,#FFF5F5,#F8F0FF)",display:"flex",alignItems:"center",justifyContent:"space-between"}}><div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:18}}>🚨</span><span style={{fontFamily:"'DM Sans',sans-serif",fontSize:14,fontWeight:800}}>Alerts</span><span style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:"#888"}}>{allAlerts.length} flagged</span></div></div>
    <div style={{maxHeight:200,overflowY:"auto"}}>{allAlerts.map(({student:s,alerts,highest})=>{const a=ALERT_LEVELS[highest];return <div key={s.name} style={{padding:"10px 24px",borderBottom:"1px solid #F5F5F8",display:"flex",alignItems:"center",gap:12,borderLeft:`4px solid ${a.border}`,background:`${a.bg}40`}}><div style={{width:32,height:32,borderRadius:"50%",background:a.bg,border:`2px solid ${a.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>{a.icon}</div><div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:700}}>{s.name}</span><AlertBadge level={highest} compact/></div><div style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:"#888",marginTop:1}}>{alerts.map(al=>al.message).join(" · ")}</div></div></div>})}</div>
  </div>;
}

const thStyle={fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:"0.06em",padding:"12px 10px",textAlign:"center",whiteSpace:"nowrap"};
const tdStyle={fontFamily:"'DM Sans',sans-serif",fontSize:14,padding:"10px",textAlign:"center",verticalAlign:"middle"};

/* ═══════════════════════════════════════
   PDF REPORT GENERATOR
   ═══════════════════════════════════════ */
function generateReport(student, records, type, weekOffset) {
  const sr = records[student.name] || {};
  const today = new Date();
  const fmtDate = d => new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  const fmtShort = d => new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});

  // Collect weeks based on report type
  let weeks = [];
  let reportTitle = "";
  let periodLabel = "";

  if (type === "weekly") {
    const wk = getWeekOffset(weekOffset);
    weeks = [wk];
    const dates = getWeekDates(wk);
    reportTitle = "Weekly Report";
    periodLabel = `${fmtDate(dates[0])} — ${fmtDate(dates[4])}`;
  } else if (type === "monthly") {
    for (let i = 0; i < 4; i++) weeks.push(getWeekOffset(weekOffset - i));
    weeks.reverse();
    const firstDates = getWeekDates(weeks[0]);
    const lastDates = getWeekDates(weeks[weeks.length-1]);
    reportTitle = "Monthly Report (4 Weeks)";
    periodLabel = `${fmtDate(firstDates[0])} — ${fmtDate(lastDates[4])}`;
  } else if (type === "unit") {
    for (let i = 0; i < 12; i++) weeks.push(getWeekOffset(weekOffset - i));
    weeks.reverse();
    const firstDates = getWeekDates(weeks[0]);
    const lastDates = getWeekDates(weeks[weeks.length-1]);
    reportTitle = "Unit Report (12 Weeks)";
    periodLabel = `${fmtDate(firstDates[0])} — ${fmtDate(lastDates[4])}`;
  }

  // Calculate data for each week
  const weekData = weeks.map(wk => {
    const dates = getWeekDates(wk);
    let completedDays = 0;
    const days = dates.map(day => {
      const cats = sr[day] || {};
      const done = CATEGORIES.map(c => !!cats[c]);
      const count = done.filter(Boolean).length;
      const isComplete = count >= 3;
      if (isComplete) completedDays++;
      return { day, done, count, isComplete };
    });
    return { weekKey: wk, dates, days, completedDays, weekComplete: completedDays >= 4 };
  });

  // Summary stats
  const totalDays = weekData.reduce((s,w) => s + 5, 0);
  const totalCompleted = weekData.reduce((s,w) => s + w.completedDays, 0);
  const totalWeeks = weekData.length;
  const completedWeeks = weekData.filter(w => w.weekComplete).length;
  const catStats = CATEGORIES.map(cat => {
    let done = 0, total = 0;
    weekData.forEach(w => w.days.forEach(d => { total++; if (d.done[CATEGORIES.indexOf(cat)]) done++; }));
    return { cat, done, total, pct: total > 0 ? Math.round((done/total)*100) : 0 };
  });

  // Build HTML
  const checkMark = (done) => done
    ? `<span style="display:inline-block;width:24px;height:24px;border-radius:6px;background:#38A169;color:#fff;text-align:center;line-height:24px;font-size:12px;font-weight:700">✓</span>`
    : `<span style="display:inline-block;width:24px;height:24px;border-radius:6px;background:#F0F0F5;color:#ccc;text-align:center;line-height:24px;font-size:12px">—</span>`;

  const statusPill = (ok, label) => `<span style="display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;background:${ok?'#E8F8EE':'#FFF3E6'};color:${ok?'#1B7A3D':'#B8600A'}">${label}</span>`;

  const pctBar = (pct, color) => `<div style="display:flex;align-items:center;gap:8px"><div style="flex:1;height:8px;background:#F0F0F5;border-radius:4px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${color};border-radius:4px"></div></div><span style="font-size:12px;font-weight:700;color:${color};min-width:36px;text-align:right">${pct}%</span></div>`;

  let weeklyGrids = "";
  weekData.forEach((w, wi) => {
    const weekLabel = `Week of ${fmtShort(w.dates[0])}`;
    weeklyGrids += `
      <div style="page-break-inside:avoid;margin-bottom:16px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:13px;font-weight:700;color:#444">${weekLabel}</span>
          ${statusPill(w.weekComplete, w.weekComplete ? 'WEEK PASS — '+w.completedDays+'/5' : w.completedDays+'/5 DAYS')}
        </div>
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <tr style="background:#FAFAFD">
            <th style="padding:6px 8px;text-align:left;color:#888;font-weight:700;border-bottom:2px solid #EEEEF2">Day</th>
            ${CATEGORIES.map(c => `<th style="padding:6px 8px;text-align:center;color:${CATEGORY_COLORS[c].active};font-weight:700;border-bottom:2px solid #EEEEF2">${c}</th>`).join('')}
            <th style="padding:6px 8px;text-align:center;color:#888;font-weight:700;border-bottom:2px solid #EEEEF2">Status</th>
          </tr>
          ${w.days.map((d, di) => `
            <tr style="border-bottom:1px solid #F5F5F8">
              <td style="padding:6px 8px;font-weight:600;color:#444">${WEEKDAYS[di]} <span style="color:#bbb;font-weight:400;font-size:11px">${fmtShort(d.day)}</span></td>
              ${CATEGORIES.map((cat, ci) => `<td style="padding:6px 8px;text-align:center">${checkMark(d.done[ci])}</td>`).join('')}
              <td style="padding:6px 8px;text-align:center">${statusPill(d.isComplete, d.count+'/4')}</td>
            </tr>
          `).join('')}
        </table>
      </div>`;
  });

  const html = `<!DOCTYPE html><html><head>
    <meta charset="UTF-8">
    <title>${student.name} — ${reportTitle}</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:'DM Sans',sans-serif;padding:40px;color:#333;max-width:800px;margin:0 auto;-webkit-print-color-adjust:exact;print-color-adjust:exact}
      @media print{body{padding:20px}@page{size:A4;margin:15mm}}
      h1{font-family:'Playfair Display',serif;font-size:24px;font-weight:800;color:#1A1A2E}
      .header{display:flex;align-items:center;gap:16px;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #EEEEF2}
      .avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#4F5BD5,#7B68EE);display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Playfair Display',serif;font-size:20px;font-weight:800}
      .info-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
      .info-box{background:#FAFAFD;border:1px solid #EEEEF2;border-radius:10px;padding:10px 14px}
      .info-label{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.06em}
      .info-value{font-size:14px;font-weight:700;color:#1A1A2E;margin-top:2px}
      .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
      .stat-box{background:#fff;border:1px solid #EEEEF2;border-radius:10px;padding:12px 14px;text-align:center}
      .stat-value{font-family:'Playfair Display',serif;font-size:24px;font-weight:800}
      .stat-label{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;margin-top:2px}
      .section-title{font-size:14px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px;padding-top:8px}
      .cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
      .cat-box{background:#fff;border:1px solid #EEEEF2;border-radius:10px;padding:12px}
      .cat-name{font-size:12px;font-weight:700;margin-bottom:6px}

    </style>
  </head><body>

    </div>

    <div class="section-title">Category Breakdown</div>

      ${catStats.map(cs => `<div class="cat-box">

    </div>
  </body></html>`;

  const win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
}

  const [loading,setLoading]=useState(true);const [students,setStudents]=useState([]);const [records,setRecords]=useState({});
  const [selectedStudent,setSelectedStudent]=useState(null);const [weekOffset,setWeekOffset]=useState(0);
  const [syncStatus,setSyncStatus]=useState(null);const syncTimer=useRef(null);

  const fetchData=useCallback(async(showLoading=false)=>{
    if(showLoading)setLoading(true);
    try{const [sr,cr]=await Promise.all([apiGet("getStudents"),apiGet("getCheckIns")]);
      if(sr.students)setStudents(sr.students.map(s=>({...s,visible:(s.status||"Active").toLowerCase()!=="hidden"})));
      if(cr.checkIns)setRecords(cr.checkIns);
    }catch(err){console.error("Fetch:",err)}
    setLoading(false);
  },[]);

  useEffect(()=>{fetchData(true)},[fetchData]);
  useEffect(()=>{const iv=setInterval(()=>fetchData(false),30000);return()=>clearInterval(iv)},[fetchData]);

  const handleToggle=useCallback(async(studentName,date,category)=>{
    setRecords(prev=>{const n={...prev};if(!n[studentName])n[studentName]={};if(!n[studentName][date])n[studentName][date]={};n[studentName][date][category]=!n[studentName][date][category];return n});
    setSyncStatus("saving");
    try{const cv=records[studentName]?.[date]?.[category];await apiPost({action:"toggleCheckIn",studentName,date,category,checked:!cv});setSyncStatus("saved")}catch(e){setSyncStatus("error")}
    if(syncTimer.current)clearTimeout(syncTimer.current);syncTimer.current=setTimeout(()=>setSyncStatus(null),2000);
  },[records]);

  if(loading)return <SkeletonScreen/>;
  return <div className="container"><SyncBadge status={syncStatus}/>
    {selectedStudent?<StudentPage student={selectedStudent} records={records} onToggle={handleToggle} onBack={()=>setSelectedStudent(null)} weekOffset={weekOffset} setWeekOffset={setWeekOffset}/>:
    <MainPage students={students} records={records} onToggle={handleToggle} onSelectStudent={setSelectedStudent} weekOffset={weekOffset} setWeekOffset={setWeekOffset} onRefresh={()=>fetchData(false)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body></html>
