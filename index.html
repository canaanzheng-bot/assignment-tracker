*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}body{font-family:'DM Sans',sans-serif;background:linear-gradient(180deg,#F6F6FB 0%,#EDEDF5 100%);min-height:100vh}@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.75}}@keyframes fadeIn{from{opacity:0}to{opacity:1}}.container{max-width:1140px;margin:0 auto;padding:32px 20px}.skeleton{border-radius:8px;background:linear-gradient(90deg,#EEEEF2 25%,#F5F5F8 50%,#EEEEF2 75%);background-size:800px 100%;animation:shimmer 1.5s ease-in-out infinite}.sk-title{height:32px;width:300px;margin-bottom:6px}.sk-subtitle{height:16px;width:220px;margin-bottom:24px}.sk-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}.sk-stat{height:80px;border-radius:14px}.sk-table{height:400px;border-radius:16px;margin-top:20px}.sk-daypicker{height:64px;border-radius:14px;margin-bottom:20px}.app-content{animation:slideUp .4s ease}.syncing-badge{position:fixed;top:16px;right:16px;z-index:999;display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:10px;font-size:12px;font-weight:700;animation:fadeIn .2s}.syncing-badge.saving{background:#FFF8EE;color:#B8600A;border:1.5px solid #FFE0B2}.syncing-badge.saved{background:#E8F8EE;color:#1B7A3D;border:1.5px solid #B2F5C7}.syncing-badge.error{background:#FFF0F0;color:#D5564F;border:1.5px solid #FFC7C7}.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(20,20,40,.45);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:20px}.modal-box{background:#fff;border-radius:20px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.18)}.modal-header{padding:20px 28px;border-bottom:1px solid #EEEEF2;display:flex;justify-content:space-between;align-items:center}.modal-body{padding:24px 28px}.week-select{padding:9px 14px;border-radius:10px;border:2px solid #E8E8EE;font-size:13px;font-family:'DM Sans',sans-serif;color:#1A1A2E;font-weight:600;outline:none;background:#fff;cursor:pointer;min-width:280px}.week-select:focus{border-color:#4F5BD5}

<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useMemo,useRef,useCallback}=React;
const API_URL="https://script.google.com/macros/s/AKfycbzr2z1ERKXAzYfyF2Ex3MQNjTEs-g6AxhmhfTZyhrkiz3znfjyuitERlpOKyzvR-fas/exec";
const CATEGORIES=["Math","Chinese","Journal","Homework"];
const CATEGORY_ICONS={Math:"∑",Chinese:"字",Journal:"✎",Homework:"📋"};
const CATEGORY_COLORS={Math:{bg:"#EEF0FF",active:"#4F5BD5",border:"#C7CAFF"},Chinese:{bg:"#FFF0F0",active:"#D5564F",border:"#FFC7C7"},Journal:{bg:"#F0FFF4",active:"#38A169",border:"#B2F5C7"},Homework:{bg:"#FFF8EE",active:"#D5944F",border:"#FFE0B2"}};
const WEEKDAYS=["Mon","Tue","Wed","Thu","Fri"];
const UNIT_WEEKS=[{key:"pre",label:"学前复习",type:"review"},{key:"w1",label:"Week 1",type:"regular"},{key:"w2",label:"Week 2",type:"regular"},{key:"w3",label:"Week 3",type:"regular"},{key:"w4",label:"Week 4",type:"regular"},{key:"mid",label:"期中复习",type:"review"},{key:"w5",label:"Week 5",type:"regular"},{key:"w6",label:"Week 6",type:"regular"},{key:"w7",label:"Week 7",type:"regular"},{key:"w8",label:"Week 8",type:"regular"},{key:"end",label:"期末复习",type:"review"}];
function getWeekDatesFromMonday(mon){const s=new Date(mon+"T00:00:00");return Array.from({length:5},(_,i)=>{const d=new Date(s);d.setDate(d.getDate()+i);return d.toISOString().split("T")[0]})}
function generateAcademicWeeks(startDate,breaks=[]){if(!startDate)return[];const breakSet=new Set(breaks);const weeks=[];let cur=new Date(startDate+"T00:00:00");for(let u=1;u<=3;u++){for(const uw of UNIT_WEEKS){while(breakSet.has(cur.toISOString().split("T")[0])){const bm=cur.toISOString().split("T")[0];weeks.push({unit:u,...uw,weekStart:bm,isBreak:true,label:"Break",fullLabel:`Break (${new Date(bm+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})})`,dates:getWeekDatesFromMonday(bm),type:"break"});cur.setDate(cur.getDate()+7)}const mon=cur.toISOString().split("T")[0];weeks.push({unit:u,...uw,weekStart:mon,isBreak:false,fullLabel:`Unit ${u} - ${uw.label}`,dates:getWeekDatesFromMonday(mon)});cur.setDate(cur.getDate()+7)}}return weeks}
function getDayKey(d=new Date()){return d.toISOString().split("T")[0]}
function isDayCompleted(c){if(!c)return false;return Object.values(c).filter(Boolean).length>=3}
function countCompletedDays(sr,wd){let c=0;for(const d of wd)if(isDayCompleted(sr?.[d]))c++;return c}
const ALERT_LEVELS={none:{color:"transparent",bg:"transparent",label:"",icon:"",border:"transparent"},yellow:{color:"#B8860B",bg:"#FFF8DC",border:"#FFE066",label:"Concern",icon:"⚠️"},red:{color:"#C0392B",bg:"#FFF0F0",border:"#FF8A8A",label:"At Risk",icon:"🔴"},purple:{color:"#6C3483",bg:"#F5EEFF",border:"#C39BFF",label:"Critical",icon:"🟣"}};
function getStudentAlerts(name,records,aw){if(!aw||aw.length===0)return[];const sr=records[name]||{};const alerts=[];const today=new Date();const ts=getDayKey(today);const ci=aw.findIndex(w=>!w.isBreak&&w.dates[0]<=ts&&w.dates[4]>=ts);if(ci===-1)return[];const cw=aw[ci];const cc=countCompletedDays(sr,cw.dates);const td=today.getDay();const rem=cw.dates.filter(d=>d>=ts).length;const best=cc+rem;if(td>=5&&cc<4)alerts.push({level:"yellow",message:`Only ${cc}/4 days this week`});else if(best<4&&td>=1&&td<=5)alerts.push({level:"yellow",message:`Can only reach ${best}/4`});const rw=aw.filter(w=>!w.isBreak&&w.dates[4]<ts).slice(-4);if(rw.length>=2){const inc=rw.filter(w=>countCompletedDays(sr,w.dates)<4).length;if(inc>=2)alerts.push({level:"red",message:`${inc}/${rw.length} recent weeks incomplete`});if(rw.length>=4&&rw.every(w=>countCompletedDays(sr,w.dates)<4))alerts.push({level:"purple",message:"4 weeks in a row"})}return alerts}
function getHighestAlert(a){if(a.some(x=>x.level==="purple"))return"purple";if(a.some(x=>x.level==="red"))return"red";if(a.some(x=>x.level==="yellow"))return"yellow";return"none"}
async function apiGet(a){const r=await fetch(`${API_URL}?action=${a}`);return r.json()}
async function apiPost(d){const r=await fetch(API_URL,{method:"POST",body:JSON.stringify(d)});return r.json()}
function SkeletonScreen(){return <div className="container"><div style={{display:"flex",justifyContent:"space-between",marginBottom:28}}><div><div className="skeleton sk-title"/><div className="skeleton sk-subtitle"/></div></div><div className="sk-stats"><div className="skeleton sk-stat"/><div className="skeleton sk-stat"/><div className="skeleton sk-stat"/><div className="skeleton sk-stat"/></div><div className="skeleton sk-daypicker"/><div className="skeleton sk-table"/></div>}
function CategoryButton({category:cat,checked,onToggle,small}){const co=CATEGORY_COLORS[cat];return <button onClick={onToggle} style={{display:"inline-flex",alignItems:"center",gap:small?4:6,padding:small?"4px 10px":"6px 14px",borderRadius:8,border:`2px solid ${checked?co.active:co.border}`,background:checked?co.active:co.bg,color:checked?"#fff":co.active,fontWeight:600,fontSize:small?12:13,cursor:"pointer",transition:"all .2s",fontFamily:"'DM Sans',sans-serif",boxShadow:checked?`0 2px 8px ${co.active}40`:"none"}}><span style={{fontSize:small?13:15}}>{checked?"✓":CATEGORY_ICONS[cat]}</span>{cat}</button>}
function StatusBadge({completed:ok,label}){return <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:700,background:ok?"#E8F8EE":"#FFF3E6",color:ok?"#1B7A3D":"#B8600A",fontFamily:"'DM Sans',sans-serif",textTransform:"uppercase"}}><span style={{fontSize:8}}>{ok?"●":"○"}</span>{label}</span>}
function AlertBadge({level,compact}){if(level==="none")return null;const a=ALERT_LEVELS[level];return <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:compact?"2px 8px":"4px 12px",borderRadius:20,fontSize:compact?10:11,fontWeight:800,background:a.bg,color:a.color,border:`1.5px solid ${a.border}`,fontFamily:"'DM Sans',sans-serif",textTransform:"uppercase"}}><span style={{fontSize:compact?10:12}}>{a.icon}</span>{a.label}</span>}
function ProgressRing({value:v,max:m,size:s=65,strokeWidth:sw=6,color:cl="#4F5BD5"}){const r=(s-sw)/2;const c=2*Math.PI*r;const p=(v/m)*c;return <svg width={s} height={s} style={{transform:"rotate(-90deg)"}}><circle cx={s/2} cy={s/2} r={r} fill="none" stroke="#F0F0F5" strokeWidth={sw}/><circle cx={s/2} cy={s/2} r={r} fill="none" stroke={cl} strokeWidth={sw} strokeDasharray={c} strokeDashoffset={c-p} strokeLinecap="round" style={{transition:"stroke-dashoffset .6s"}}/></svg>}
function SyncBadge({status}){if(!status)return null;return <div className={`syncing-badge ${status==="saving"?"saving":status==="saved"?"saved":"error"}`}>{status==="saving"?"☁️ Saving...":status==="saved"?"✅ Synced":"❌ Error"}</div>}
/* Academic Week Selector */
function AcademicWeekSelector({academicWeeks:aw,selectedIdx:si,onSelect}){if(!aw||aw.length===0)return null;const ts=getDayKey();const units={};aw.forEach((w,i)=>{const g=w.isBreak?"Breaks":`Unit ${w.unit}`;if(!units[g])units[g]=[];units[g].push({...w,idx:i})});const fm=d=>new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});return <select className="week-select" value={si} onChange={e=>onSelect(Number(e.target.value))}>{Object.entries(units).map(([g,ws])=><optgroup key={g} label={g}>{ws.map(w=>{const isCur=!w.isBreak&&w.dates[0]<=ts&&w.dates[4]>=ts;return <option key={w.idx} value={w.idx}>{w.isBreak?`🏖 Break — ${fm(w.dates[0])}`:`${w.fullLabel} (${fm(w.dates[0])}-${fm(w.dates[4])})${isCur?" ◀ NOW":""}`}</option>})}</optgroup>)}</select>}
/* Day Picker */
function DayPicker({weekDates:wd,selectedDay:sd,onSelectDay:osd,label:lb}){const tk=getDayKey();return <div style={{background:"#fff",borderRadius:14,border:"1px solid #EEEEF2",padding:"12px 16px",marginBottom:20}}><div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:16}}>📅</span><span style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:700,color:"#666",textTransform:"uppercase"}}>{lb||"Check-in for:"}</span></div><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{wd.map((ds,i)=>{const it=ds===tk,is=ds===sd,ip=ds<tk,ifu=ds>tk;return <button key={ds} onClick={()=>osd(ds)} style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"8px 14px",borderRadius:10,cursor:"pointer",border:is?"2px solid #4F5BD5":"2px solid #E8E8EE",background:is?"linear-gradient(135deg,#4F5BD5,#7B68EE)":(it?"#F5F5FF":"#fff"),color:is?"#fff":(ifu?"#ccc":"#444"),fontFamily:"'DM Sans',sans-serif",opacity:ifu?.5:1,minWidth:64,boxShadow:is?"0 3px 12px rgba(79,91,213,.3)":"none",position:"relative"}}><span style={{fontSize:12,fontWeight:800}}>{WEEKDAYS[i]}</span><span style={{fontSize:10,fontWeight:500,marginTop:1,opacity:is?.9:.7}}>{new Date(ds+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>{it&&!is&&<div style={{position:"absolute",top:-3,right:-3,width:8,height:8,borderRadius:"50%",background:"#4F5BD5",border:"2px solid #fff"}}/>}{ip&&!is&&!it&&<div style={{position:"absolute",bottom:-2,left:"50%",transform:"translateX(-50%)",fontSize:7,color:"#D5944F",fontWeight:800}}>CATCH UP</div>}</button>})}</div>{sd!==tk&&sd<tk&&<div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",borderRadius:8,background:"#FFF8EE",border:"1.5px solid #FFE0B2"}}><span style={{fontSize:12}}>⏪</span><span style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,fontWeight:700,color:"#B8600A"}}>Catch-Up</span><button onClick={()=>osd(tk)} style={{background:"none",border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:11,fontWeight:700,color:"#4F5BD5",textDecoration:"underline",padding:0}}>→ Today</button></div>}</div></div>}
/* Calendar Setup Modal */
function CalendarSetupModal({open,onClose,calConfig:cc,onSave}){const[sd,setSd]=useState(cc?.startDate||"");const[brk,setBrk]=useState(cc?.breaks?cc.breaks.split(",").filter(Boolean):[]);const[saving,setSaving]=useState(false);const preview=useMemo(()=>sd?generateAcademicWeeks(sd,brk):[],[sd,brk]);const toggleBrk=m=>setBrk(p=>p.includes(m)?p.filter(b=>b!==m):[...p,m]);const allMons=useMemo(()=>{if(!sd)return[];const ms=[];const d=new Date(sd+"T00:00:00");for(let i=0;i<52;i++){ms.push(d.toISOString().split("T")[0]);d.setDate(d.getDate()+7)}return ms},[sd]);const doSave=async()=>{setSaving(true);await apiPost({action:"saveCalendar",config:{startDate:sd,breaks:brk.join(",")}});onSave({startDate:sd,breaks:brk.join(",")});setSaving(false);onClose()};if(!open)return null;return <div className="modal-overlay" onClick={onClose}><div className="modal-box" style={{maxWidth:640}} onClick={e=>e.stopPropagation()}><div className="modal-header"><h3 style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:800,color:"#1A1A2E"}}>📅 Academic Calendar Setup</h3><button onClick={onClose} style={{width:32,height:32,borderRadius:"50%",border:"none",background:"#F5F5F8",cursor:"pointer",fontSize:16,color:"#999",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button></div><div className="modal-body"><div style={{marginBottom:20}}><label style={{display:"block",fontSize:12,fontWeight:700,color:"#666",textTransform:"uppercase",marginBottom:6}}>Unit 1 Start Date (Monday of 学前复习)</label><input type="date" value={sd} onChange={e=>setSd(e.target.value)} style={{padding:"10px 14px",borderRadius:10,border:"2px solid #E8E8EE",fontSize:14,fontFamily:"'DM Sans',sans-serif",outline:"none",width:"100%"}}/></div>{sd&&<><div style={{marginBottom:16}}><label style={{display:"block",fontSize:12,fontWeight:700,color:"#666",textTransform:"uppercase",marginBottom:6}}>Mark Break Weeks (click to toggle)</label><p style={{fontSize:11,color:"#999",marginBottom:8}}>Click any Monday to mark as break. Breaks are skipped in the academic sequence.</p><div style={{display:"flex",flexWrap:"wrap",gap:4,maxHeight:140,overflowY:"auto",padding:4}}>{allMons.map(m=>{const ib=brk.includes(m);return <button key={m} onClick={()=>toggleBrk(m)} style={{padding:"3px 8px",borderRadius:6,border:`1.5px solid ${ib?"#D5564F":"#E8E8EE"}`,background:ib?"#FFF0F0":"#fff",color:ib?"#D5564F":"#666",fontSize:10,fontFamily:"'DM Sans',sans-serif",fontWeight:ib?700:500,cursor:"pointer"}}>{ib?"🏖 ":""}{new Date(m+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</button>})}</div></div><div style={{marginBottom:20}}><label style={{display:"block",fontSize:12,fontWeight:700,color:"#666",textTransform:"uppercase",marginBottom:6}}>Preview ({preview.filter(w=>!w.isBreak).length} academic + {preview.filter(w=>w.isBreak).length} breaks)</label><div style={{maxHeight:200,overflowY:"auto",border:"1px solid #EEEEF2",borderRadius:10}}>{preview.map((w,i)=><div key={i} style={{padding:"5px 10px",borderBottom:"1px solid #F5F5F8",display:"flex",justifyContent:"space-between",background:w.isBreak?"#FFF0F0":(w.type==="review"?"#FFF8EE":"#fff"),fontSize:11}}><span style={{fontWeight:w.isBreak?500:700,color:w.isBreak?"#D5564F":(w.type==="review"?"#B8600A":"#1A1A2E")}}>{w.isBreak?"🏖 Break":w.fullLabel}</span><span style={{color:"#888"}}>{new Date(w.dates[0]+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})} — {new Date(w.dates[4]+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span></div>)}</div></div></>}<button onClick={doSave} disabled={!sd||saving} style={{width:"100%",padding:"12px 0",borderRadius:12,border:"none",background:sd?"linear-gradient(135deg,#4F5BD5,#7B68EE)":"#E8E8EE",color:sd?"#fff":"#999",fontFamily:"'DM Sans',sans-serif",fontSize:15,fontWeight:700,cursor:sd?"pointer":"default"}}>{saving?"Saving...":"💾 Save Calendar"}</button></div></div></div>}
/* Alerts Panel */
function AlertsSummaryPanel({students:ss,records:rr,academicWeeks:aw}){const aa=useMemo(()=>{const r=[];for(const s of ss.filter(s=>s.visible)){const a=getStudentAlerts(s.name,rr,aw);if(a.length>0)r.push({student:s,alerts:a,highest:getHighestAlert(a)})}r.sort((a,b)=>{const o={purple:0,red:1,yellow:2};return(o[a.highest]??9)-(o[b.highest]??9)});return r},[ss,rr,aw]);if(aa.length===0)return null;return <div style={{background:"#fff",borderRadius:16,border:"1px solid #EEEEF2",overflow:"hidden",marginBottom:24}}><div style={{padding:"14px 24px",borderBottom:"1px solid #EEEEF2",background:"linear-gradient(135deg,#FFFBF0,#FFF5F5,#F8F0FF)",display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:18}}>🚨</span><span style={{fontFamily:"'DM Sans',sans-serif",fontSize:14,fontWeight:800}}>Alerts</span><span style={{fontSize:12,color:"#888"}}>{aa.length} flagged</span></div><div style={{maxHeight:200,overflowY:"auto"}}>{aa.map(({student:s,alerts,highest:h})=>{const a=ALERT_LEVELS[h];return <div key={s.name} style={{padding:"10px 24px",borderBottom:"1px solid #F5F5F8",display:"flex",alignItems:"center",gap:12,borderLeft:`4px solid ${a.border}`,background:`${a.bg}40`}}><div style={{width:32,height:32,borderRadius:"50%",background:a.bg,border:`2px solid ${a.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>{a.icon}</div><div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:13,fontWeight:700}}>{s.name}</span><AlertBadge level={h} compact/></div><div style={{fontSize:11,color:"#888",marginTop:1}}>{alerts.map(al=>al.message).join(" · ")}</div></div></div>})}</div></div>}
const thStyle={fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:".06em",padding:"12px 10px",textAlign:"center",whiteSpace:"nowrap"};
const tdStyle={fontFamily:"'DM Sans',sans-serif",fontSize:14,padding:"10px",textAlign:"center",verticalAlign:"middle"};
/* PDF Report */
function generateReport(student,records,type,aw,ci){const sr=records[student.name]||{};const cw=aw[ci];if(!cw)return;const fs=d=>new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});const fl=d=>new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});let weeks=[],title="",period="";if(type==="weekly"){weeks=[cw];title=`Weekly Report — ${cw.fullLabel}`;period=`${fl(cw.dates[0])} — ${fl(cw.dates[4])}`}else if(type==="monthly"){const uw=aw.filter(w=>!w.isBreak&&w.unit===cw.unit);const p=uw.findIndex(w=>w.weekStart===cw.weekStart);weeks=uw.slice(Math.max(0,p-3),p+1);title=`Monthly Report — Unit ${cw.unit}`;period=weeks.length?`${fl(weeks[0].dates[0])} — ${fl(weeks[weeks.length-1].dates[4])}`:""}else{weeks=aw.filter(w=>!w.isBreak&&w.unit===cw.unit);title=`Unit ${cw.unit} Full Report`;period=weeks.length?`${fl(weeks[0].dates[0])} — ${fl(weeks[weeks.length-1].dates[4])}`:""}const wd=weeks.map(w=>{let cd=0;const days=w.dates.map(day=>{const cats=sr[day]||{};const done=CATEGORIES.map(c=>!!cats[c]);const cnt=done.filter(Boolean).length;const ic=cnt>=3;if(ic)cd++;return{day,done,count:cnt,isComplete:ic}});return{...w,days,completedDays:cd,weekComplete:cd>=4}});const td2=wd.length*5,tc=wd.reduce((s,w)=>s+w.completedDays,0),cw2=wd.filter(w=>w.weekComplete).length;const cs=CATEGORIES.map(cat=>{let d=0,t=0;wd.forEach(w=>w.days.forEach(dd=>{t++;if(dd.done[CATEGORIES.indexOf(cat)])d++}));return{cat,done:d,total:t,pct:t>0?Math.round(d/t*100):0}});const cm=ok=>ok?'<span style="display:inline-block;width:22px;height:22px;border-radius:5px;background:#38A169;color:#fff;text-align:center;line-height:22px;font-size:11px;font-weight:700">✓</span>':'<span style="display:inline-block;width:22px;height:22px;border-radius:5px;background:#F0F0F5;color:#ccc;text-align:center;line-height:22px;font-size:11px">—</span>';const sp=(ok,lb)=>`<span style="display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weig er-box;margin:0;padding:0}body{font-family:'DM Sans',sans-serif;padding:36px;color:#333;max-width:800px;margin:0 auto;-webkit-print-color-adjust:exact;print-color-adjust:exact}@media print{body{padding:16px}@page{size:A4;margin:12mm}.pb{display:none!important}}h1{font-family:'Playfair Display',serif;font-size:22px;font-weight:800;color:#1A1A2E}.hdr{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid #EEEEF2}.av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#4F5BD5,#7B68EE);display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Playfair Display',serif;font-size:18px;font-weight:800}.ig{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}.ib{background:#FAFAFD;border:1px solid #EEEEF2;border-radius:8px;padding:8px 12px}.il{font-size:9px;font-weight:700;color:#888;text-transform:uppercase}.iv{font-size:13px;font-weight:700;color:#1A1A2E;margin-top:1px}.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}.sb{background:#fff;border:1px solid #EEEEF2;border-radius:8px;padding:10px 12px;text-align:center}.sv{font-family:'Playfair Display',serif;font-size:22px;font-weight:800}.sl{font-size:9px;font-weight:700;color:#888;text-transform:uppercase;margin-top:2px}.st{font-size:13px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}.cg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}.cb{background:#fff;border:1px solid #EEEEF2;border-radius:8px;padding:10px}.cn{font-size:11px;font-weight:700;margin-bottom:4px}.pb{position:fixed;bottom:20px;right:20px;padding:10px 20px;border-radius:10px;border:none;background:linear-gradient(135deg,#4F5BD5,#7B68EE);color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(79,91,213,.3);z-index:100}.ft{margin-top:20px;padding-top:10px;border-top:1px solid #EEEEF2;t <div style={{background:"#fff",borderRadius:16,border:"1px solid #EEEEF2",padding:"16px 22px",marginBottom:24}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:16}}>📄</span><span style={{fontSize:13,fontWeight:700,color:"#666",textTransform:"uppercase"}}>Reports</span></div><div style={{display:"flex",gap:8,flexWrap:"wrap"}}><button onClick={()=>generateReport(st,rr,"weekly",aw,si)} style={{padding:"8px 14px",borderRadius:10,border:"2px solid #4F5BD5",background:"#EEF0FF",color:"#4F5BD5",fontSize:12,fontWeight:700,cursor:"pointer"}}>📋 Weekly</button><button onClick={()=>generateReport(st,rr,"monthly",aw,si)} style={{padding:"8px 14px",borderRadius:10,border:"2px solid #38A169",background:"#E8F8EE",color:"#1B7A3D",fontSize:12,fontWeight:700,cursor:"pointer"}}>📊 Monthly</button><button onClick={()=>generateReport(st,rr,"unit",aw,si)} style={{padding:"8px 14px",borderRadius:10,border:"2px solid #D5944F",background:"#FFF8EE",color:"#B8600A",fontSize:12,fontWeight:700,cursor:"pointer"}}>📑 Unit</button></div></div></div>

sBadge completed={dd.isComplete} label={`${dd.count}/4`}/></td></tr>})}</tbody></table></div></div>}

function App(){const[loading,setLoading]=useState(true);const[students,setStudents]=useState([]);const[records,setRecords]=useState({});const[calConfig,setCalConfig]=useState(null);const[calOpen,setCalOpen]=useState(false);const[selStudent,setSelStudent]=useState(null);const[selWeek,setSelWeek]=useState(0);const[syncStatus,setSyncStatus]=useState(null);const syncT=useRef(null);const aw=useMemo(()=>{if(!calConfig?.startDate)return[];return generateAcademicWeeks(calConfig.startDate,(calConfig.breaks||"").split(",").filter(Boolean))},[calConfig]);useEffect(()=>{if(aw.length===0)return;const ts=getDayKey();const idx=aw.findIndex(w=>w.dates[0]<=ts&&w.dates[4]>=ts);if(idx>=0)setSelWeek(idx);else{const p=aw.filter(w=>w.dates[4]<ts);if(p.length>0)setSelWeek(aw.indexOf(p[p.length-1]))}},[aw]);const fetchData=useCallback(async(sl=false)=>{if(sl)setLoading(true);try{const[sr,cr,cal]=await Promise.all([apiGet("getStudents"),apiGet("getCheckIns"),apiGet("getCalendar")]);if(sr.students)setStudents(sr.students.map(s=>({...s,visible:(s.status||"Active").toLowerCase()!=="hidden"})));if(cr.checkIns)setRecords(cr.checkIns);if(cal.calendar)setCalConfig(cal.calendar)}catch(e){console.error(e)}setLoading(false)},[]);useEffect(()=>{fetchData(true)},[fetchData]);useEffect(()=>{const iv=setInterval(()=>fetchData(false),30000);return()=>clearInterval(iv)},[fetchData]);const handleToggle=useCallback(async(n,d,c)=>{setRecords(p=>{const x={...p};if(!x[n])x[n]={};if(!x[n][d])x[n][d]={};x[n][d][c]=!x[n][d][c];return x});setSyncStatus("saving");try{const cv=records[n]?.[d]?.[c];await apiPost({action:"toggleCheckIn",studentName:n,date:d,category:c,checked:!cv});setSyncStatus("saved")}catch(e){setSyncStatus("error")}if(syncT.current)clearTimeout(syncT.current);syncT.current=setTimeout(()=>setSyncStatus(null),2000)},[records]);if(loading)return <SkeletonScreen/>;return <div className="container"><SyncBadge status={syncStatus}/>{selStudent?<StudentPage student={selStudent} records={records} onToggle={handleToggle} onBack={()=>setSelStudent(null)} academicWeeks={aw} selectedWeekIdx={selWeek} setSelectedWeekIdx={setSelWeek}/>:<MainPage students={students} records={records} onToggle={handleToggle} onSelectStudent={setSelStudent} academicWeeks={aw} selectedWeekIdx={selWeek} setSelectedWeekIdx={setSelWeek} onRefresh={()=>fetchData(false)} onOpenCalendar={()=>setCalOpen(true)}/>}<CalendarSetupModal open={calOpen} onClose={()=>setCalOpen(false)} calConfig={calConfig} onSave={cfg=>{setCalConfig(cfg);setCalOpen(false)}}/></div>}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
