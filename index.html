<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSLC Assignment Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
:root{--bg:#F8F6F1;--card:#FFF;--primary:#2D5A3D;--primary-light:#E8F0EB;--primary-hover:#3D7A52;--accent:#D4845A;--text:#2C2C2C;--text-secondary:#6B6B6B;--text-muted:#9A9A9A;--border:#E8E4DE;--border-light:#F0EDE8;--danger:#C0392B;--danger-light:#FDECEA;--success:#27AE60;--success-light:#E8F8F0;--warning:#F39C12;--warning-light:#FFF8E8;--shadow-sm:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.06);--shadow-md:0 4px 12px rgba(0,0,0,.06),0 2px 4px rgba(0,0,0,.04);--shadow-lg:0 12px 32px rgba(0,0,0,.08),0 4px 8px rgba(0,0,0,.04);--radius:10px;--radius-lg:16px;--transition:.2s cubic-bezier(.4,0,.2,1)}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
.header{background:var(--primary);color:#fff;padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.15)}.header-left{display:flex;align-items:center;gap:14px}.header-logo{font-family:'Fraunces',serif;font-size:22px;font-weight:700}.header-divider{width:1px;height:28px;background:rgba(255,255,255,.25)}.header-subtitle{font-size:13px;opacity:.8}.header-actions{display:flex;align-items:center;gap:10px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;border:none;transition:var(--transition);white-space:nowrap}.btn-ghost{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.15)}.btn-ghost:hover{background:rgba(255,255,255,.22)}.btn-solid{background:var(--primary);color:#fff}.btn-solid:hover{background:var(--primary-hover)}.btn-outline{background:transparent;color:var(--primary);border:1.5px solid var(--border)}.btn-outline:hover{background:var(--primary-light);border-color:var(--primary)}.btn-sm{padding:5px 10px;font-size:12px}
.back-btn{display:none;align-items:center;gap:6px;background:none;border:none;color:#fff;font-family:inherit;font-size:14px;cursor:pointer;padding:6px 0;opacity:.9}.back-btn:hover{opacity:1}.back-btn svg{width:18px;height:18px}
.main{max-width:1280px;margin:0 auto;padding:28px 32px 60px}
.week-bar{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap}.week-nav{display:flex;align-items:center;gap:2px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow-sm);overflow:hidden}.week-nav-btn{background:none;border:none;padding:10px 12px;cursor:pointer;color:var(--text-secondary);transition:var(--transition);display:flex;align-items:center}.week-nav-btn:hover{background:var(--primary-light);color:var(--primary)}.week-nav-btn svg{width:16px;height:16px}.week-label{font-weight:600;font-size:15px;padding:0 8px;min-width:200px;text-align:center}.week-date{font-size:13px;color:var(--text-muted);font-weight:400}.week-bar-right{margin-left:auto;display:flex;gap:8px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}.stat-card{background:var(--card);border-radius:var(--radius);padding:18px 20px;border:1px solid var(--border);box-shadow:var(--shadow-sm)}.stat-label{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;font-weight:500;margin-bottom:6px}.stat-value{font-family:'Fraunces',serif;font-size:28px;font-weight:700}.stat-sub{font-size:12px;color:var(--text-secondary);margin-top:2px}
.table-card{background:var(--card);border-radius:var(--radius-lg);border:1px solid var(--border);box-shadow:var(--shadow-md);overflow:hidden}.table-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}.table-title{font-family:'Fraunces',serif;font-size:18px;font-weight:600}.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:850px}thead th{padding:12px 6px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted);background:#FAFAF7;border-bottom:1px solid var(--border);text-align:center;white-space:nowrap}thead th:first-child{text-align:left;padding-left:24px}.day-col-group{border-left:2px solid var(--border)}.day-header{font-size:12px;font-weight:600;color:var(--text);text-transform:none;letter-spacing:0}.day-date{font-size:10px;color:var(--text-muted);font-weight:400}tbody tr{border-bottom:1px solid var(--border-light);transition:var(--transition)}tbody tr:hover{background:#FCFBF8}tbody tr:last-child{border-bottom:none}td{padding:6px 4px;text-align:center;vertical-align:middle}td:first-child{text-align:left;padding-left:24px}
.student-name-cell{display:flex;align-items:center;gap:10px}.student-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#fff;flex-shrink:0}.student-name-link{font-weight:500;font-size:14px;color:var(--primary);cursor:pointer;text-decoration:none;transition:var(--transition)}.student-name-link:hover{color:var(--primary-hover);text-decoration:underline}
.check-btn{width:32px;height:32px;border-radius:8px;border:2px solid var(--border);background:var(--card);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:var(--transition);font-size:15px;line-height:1}.check-btn:hover{border-color:var(--primary);background:var(--primary-light);transform:scale(1.08)}.check-btn.checked{background:var(--success);border-color:var(--success);color:#fff}.check-btn.checked:hover{background:#219a52;border-color:#219a52}
.check-btn.absent-disabled{opacity:.25;pointer-events:none;background:#f5f5f0;border-color:#e0e0d8}
.absent-btn{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);background:var(--card);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--text-muted);transition:var(--transition);line-height:1}.absent-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--warning-light)}.absent-btn.is-absent{background:var(--accent);border-color:var(--accent);color:#fff}
.cat-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;display:block}.cat-math{color:#8E44AD}.cat-chinese{color:#C0392B}.cat-journal{color:#2980B9}.cat-homework{color:#D4845A}.cat-absent{color:var(--accent)}
.week-total-cell{font-family:'Fraunces',serif;font-weight:700;font-size:15px}.week-pass{color:var(--success);background:var(--success-light);border-radius:20px;padding:4px 10px;display:inline-block}.week-fail{color:var(--danger);background:var(--danger-light);border-radius:20px;padding:4px 10px;display:inline-block}.week-partial{color:var(--warning);background:var(--warning-light);border-radius:20px;padding:4px 10px;display:inline-block}
#studentPage{display:none}.student-hero{background:var(--card);border-radius:var(--radius-lg);border:1px solid var(--border);box-shadow:var(--shadow-md);padding:28px 32px;margin-bottom:24px;display:flex;align-items:center;gap:24px}.hero-avatar{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;flex-shrink:0}.hero-info{flex:1}.hero-name{font-family:'Fraunces',serif;font-size:26px;font-weight:700;margin-bottom:4px}.hero-meta{font-size:13px;color:var(--text-secondary)}.hero-stats{display:flex;gap:24px}.hero-stat{text-align:center}.hero-stat-value{font-family:'Fraunces',serif;font-size:24px;font-weight:700}.hero-stat-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}.detail-card{background:var(--card);border-radius:var(--radius-lg);border:1px solid var(--border);box-shadow:var(--shadow-sm);padding:24px}.detail-card-full{grid-column:1/-1}.detail-card-title{font-family:'Fraunces',serif;font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.ring-container{display:flex;align-items:center;gap:32px;justify-content:center;padding:10px 0}.ring-wrap{position:relative;width:140px;height:140px}.ring-wrap svg{transform:rotate(-90deg);width:140px;height:140px}.ring-bg{fill:none;stroke:var(--border);stroke-width:10}.ring-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1)}.ring-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}.ring-pct{font-family:'Fraunces',serif;font-size:30px;font-weight:700;display:block}.ring-label{font-size:11px;color:var(--text-muted)}
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:160px;padding-top:10px}.bar-group{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}.bar-stack{width:100%;max-width:48px;display:flex;flex-direction:column;gap:2px}.bar-segment{border-radius:4px;min-height:3px;transition:all .4s ease}.bar-day-label{font-size:11px;font-weight:500;color:var(--text-secondary)}.bar-count{font-size:11px;font-weight:600}
.cat-breakdown{display:grid;grid-template-columns:1fr 1fr;gap:12px}.cat-stat{background:#FAFAF7;border-radius:var(--radius);padding:14px 16px;border:1px solid var(--border-light)}.cat-stat-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}.cat-stat-name{font-size:13px;font-weight:600}.cat-stat-pct{font-family:'Fraunces',serif;font-size:18px;font-weight:700}.cat-stat-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}.cat-stat-bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.heatmap-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:8px}.heatmap-cell{aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;font-weight:500;border:1px solid transparent;transition:var(--transition)}.heatmap-cell:hover{transform:scale(1.05)}.heatmap-cell .hm-day{font-weight:600;font-size:11px}.heatmap-cell .hm-count{font-size:9px;opacity:.8}.hm-0{background:#F5F5F0;color:var(--text-muted);border-color:var(--border-light)}.hm-1{background:#FFF3CD;color:#856404}.hm-2{background:#FFEAA7;color:#7D6608}.hm-3{background:#D5F5E3;color:#1E8449}.hm-4{background:#82E0AA;color:#1B6B38}.hm-absent{background:#FDE8E0;color:var(--accent);border-color:#F5D5C5}
.heatmap-legend{display:flex;align-items:center;gap:6px;margin-top:12px;font-size:11px;color:var(--text-muted)}.heatmap-legend-swatch{width:14px;height:14px;border-radius:3px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}.modal-overlay.active{display:flex}.modal{background:var(--card);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);max-width:700px;width:92%;max-height:85vh;overflow:hidden;display:flex;flex-direction:column}.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}.modal-title{font-family:'Fraunces',serif;font-size:18px;font-weight:600}.modal-close{background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px;border-radius:6px}.modal-close:hover{background:#f0f0f0;color:var(--text)}.modal-body{padding:24px;overflow-y:auto;flex:1}.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.cal-table{width:100%;border-collapse:collapse;font-size:13px}.cal-table th{padding:8px 10px;text-align:left;font-weight:600;background:#FAFAF7;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted)}.cal-table td{padding:8px 10px;border-bottom:1px solid var(--border-light);text-align:left}.cal-table tr.active-week td{background:var(--primary-light);font-weight:500}.cal-active-badge{display:inline-block;background:var(--primary);color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.loading-state{text-align:center;padding:60px 20px;color:var(--text-muted)}.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}@keyframes spin{to{transform:rotate(360deg)}}.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:12px 20px;border-radius:var(--radius);font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);z-index:300;opacity:0;transform:translateY(10px);transition:all .3s ease;pointer-events:none;max-width:400px}.toast.show{opacity:1;transform:translateY(0)}.toast.error{background:var(--danger)}
.filter-bar{display:flex;gap:8px;align-items:center}.filter-bar select{font-family:inherit;font-size:13px;padding:6px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);color:var(--text);cursor:pointer}
@media(max-width:768px){.main{padding:16px}.stats-row{grid-template-columns:repeat(2,1fr);gap:10px}.detail-grid{grid-template-columns:1fr}.header{padding:0 16px}.student-hero{flex-direction:column;text-align:center;padding:20px}.hero-stats{justify-content:center}.ring-container{flex-direction:column}.cat-breakdown{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="header">
  <div class="header-left">
    <button class="back-btn" id="backBtn" onclick="showMainPage()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>Back</button>
    <div class="header-logo">MSLC</div><div class="header-divider"></div>
    <div class="header-subtitle" id="headerSubtitle">Assignment Tracker</div>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="openCalendarModal()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Calendar</button>
    <button class="btn btn-ghost" onclick="refreshData()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>Refresh</button>
  </div>
</header>
<div id="mainPage" class="main">
  <div class="week-bar">
    <div class="week-nav">
      <button class="week-nav-btn" onclick="changeWeek(-1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
      <div class="week-label" id="weekLabel">Loading...</div>
      <button class="week-nav-btn" onclick="changeWeek(1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>
    </div>
    <div class="week-bar-right">
      <div class="filter-bar"><select id="statusFilter" onchange="renderAll()"><option value="all">All Students</option><option value="Active" selected>Active Only</option></select></div>
      <button class="btn btn-outline btn-sm" onclick="goToCurrentWeek()">Today</button>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Students</div><div class="stat-value" id="statStudents">&mdash;</div></div>
    <div class="stat-card"><div class="stat-label">Week Completion</div><div class="stat-value" id="statWeekComp">&mdash;</div><div class="stat-sub" id="statWeekSub"></div></div>
    <div class="stat-card"><div class="stat-label">Today's Check-ins</div><div class="stat-value" id="statToday">&mdash;</div><div class="stat-sub" id="statTodaySub"></div></div>
    <div class="stat-card"><div class="stat-label">Weekly Pass Rate</div><div class="stat-value" id="statPassRate">&mdash;</div><div class="stat-sub" id="statPassSub"></div></div>
  </div>
  <div class="table-card">
    <div class="table-header"><div class="table-title">&#x1F4CB; Weekly Check-in</div><div style="font-size:11px;color:var(--text-muted);">&#x1F534; A = Absent (day excluded)</div></div>
    <div class="table-scroll"><table><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table></div>
  </div>
  <div class="loading-state" id="loadingState"><div class="spinner"></div><div>Loading assignment data...</div></div>
</div>
<div id="studentPage" class="main"></div>
<div class="modal-overlay" id="calendarModal"><div class="modal"><div class="modal-header"><div class="modal-title">&#x1F4C5; School Calendar</div><button class="modal-close" onclick="closeCalendarModal()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div><div class="modal-body" id="calendarBody"></div><div class="modal-footer"><div style="font-size:12px;color:var(--text-muted);flex:1;">Calendar is managed in Google Sheets</div><button class="btn btn-outline" onclick="closeCalendarModal()">Close</button></div></div></div>
<div class="toast" id="toast"></div>

<script>
const API='https://script.google.com/macros/s/AKfycby0y615CrSuu_BmfffznkuYZYj7DMKNejxJEu8X8bnd9S0AJaypSUfW5SRSg-2foXpA/exec';
const CATEGORIES=['Math','Chinese','Journal','Homework'];
const CAT_COLORS={Math:'#8E44AD',Chinese:'#C0392B',Journal:'#2980B9',Homework:'#D4845A'};
const CAT_ICONS={Math:'\u{1F522}',Chinese:'\u{1F004}',Journal:'\u{1F4D3}',Homework:'\u{1F4DA}'};
const DAYS=['Mon','Tue','Wed','Thu','Fri'];
const AVATAR_COLORS=['#2D5A3D','#8E44AD','#2980B9','#C0392B','#D4845A','#1ABC9C','#E67E22','#3498DB','#E74C3C','#9B59B6','#16A085','#F39C12','#2ECC71','#E91E63','#00BCD4'];
const DAY_PASS=3; // 3 of 4 categories to pass a day

let students=[], checkIns={}, absences={}, calendar=[], currentWeekIndex=0;

// Absent day excluded: if present 5→need 4, present 4→need 3, present 3→need 2, etc.
function weekPassThreshold(presentDays){ return Math.max(1, presentDays-1); }
function isAbsent(name,date){ return !!absences[name+'-'+date]; }
function ciKey(n,d){ return n+'-'+d; }

// ─── API (Safari-compatible) ───
async function apiFetch(action){
  const url=`${API}?action=${encodeURIComponent(action)}`;
  try{const r=await fetch(url,{credentials:'omit',redirect:'follow'});const t=await r.text();if(t&&!t.trim().startsWith('<'))return JSON.parse(t);}catch(e){}
  return new Promise((res,rej)=>{const x=new XMLHttpRequest();x.open('GET',url,true);x.onload=function(){try{if(x.responseText&&!x.responseText.trim().startsWith('<'))res(JSON.parse(x.responseText));else rej(new Error('HTML'));}catch(e){rej(e);}};x.onerror=function(){rej(new Error('network'));};x.send();});
}
async function apiPost(data){
  try{const r=await fetch(API,{method:'POST',credentials:'omit',redirect:'follow',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(data)});const t=await r.text();try{return JSON.parse(t);}catch{return{raw:t};}}
  catch(e){return new Promise(res=>{const x=new XMLHttpRequest();x.open('POST',API,true);x.setRequestHeader('Content-Type','text/plain;charset=utf-8');x.onload=function(){try{res(JSON.parse(x.responseText));}catch{res({raw:x.responseText});}};x.onerror=function(){res({error:'network'});};x.send(JSON.stringify(data));});}
}

// ─── Parse ───
function parseDateString(s){if(!s)return null;s=String(s).trim();if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;const d=new Date(s);if(!isNaN(d))return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');return null;}
function parseDate(s){const n=parseDateString(s);if(!n)return null;const[y,m,d]=n.split('-').map(Number);return new Date(y,m-1,d);}
function parseStudents(raw){const arr=raw.students||raw.data||(Array.isArray(raw)?raw:[]);return arr.map((s,i)=>({id:String(i),name:s.name||s.Name||'',school:s.school||'',grade:s.grade||'',status:s.status||s.Status||'Active'})).filter(s=>s.name);}
function parseCheckIns(raw){
  const obj=raw.checkIns||raw.data||raw, result={};
  if(typeof obj==='object'&&!Array.isArray(obj)){
    for(const sn of Object.keys(obj)){const dObj=obj[sn];if(typeof dObj!=='object')continue;
      for(const ds of Object.keys(dObj)){const dk=parseDateString(ds);if(!dk)continue;const cats=dObj[ds],key=sn+'-'+dk;result[key]={};
        CATEGORIES.forEach(c=>{if(cats[c]===true||cats[c]==='TRUE'||cats[c]===1)result[key][c]=true;});
        // If API sends absent flag
        if(cats.Absent===true||cats.absent===true)absences[sn+'-'+dk]=true;
      }}
  }
  return result;
}
function parseCalendar(raw){const arr=raw.calendar||raw.data||(Array.isArray(raw)?raw:[]);return arr.map((w,i)=>({label:w.label||w.Label||`Week ${i+1}`,mondayDate:w.mondayDate||w.monday||w.date||'',active:w.active===true||w.active==='Yes'||w.active==='TRUE'}));}

// ─── LocalStorage Cache ───
function saveToLocal(){
  try{
    localStorage.setItem('mslc_checkIns',JSON.stringify(checkIns));

// ─── Load ───
async function loadAllData(){
  document.getElementById('loadingState').style.display='block';

  // Step 1: Load from localStorage INSTANTLY (survives refresh)
  loadFromLocal();

  try{
    // Step 2: Fetch fresh data from API in parallel
    const[rawS,rawC,rawCal]=await Promise.all([apiFetch('getStudents'),apiFetch('getCheckIns'),apiFetch('getCalendar')]);
    students=parseStudents(rawS);
    calendar=parseCalendar(rawCal);

    // Step 3: Merge API check-ins with local state
    const apiCheckIns=parseCheckIns(rawC);
    const localKeys=Object.keys(checkIns);

    if(localKeys.length===0){
      // First load ever: use API data as-is
      checkIns=apiCheckIns;
    } else {
      // Merge: API fills in any student-days we don't have locally
      for(const key of Object.keys(apiCheckIns)){
        if(!checkIns[key]) checkIns[key]=apiCheckIns[key];
      }
    }
    // Save merged state
    saveToLocal();

    autoSelectWeek(); renderAll();
  }catch(err){
    console.error(err);
    // Even if API fails, we still have localStorage data + can render
    if(students.length>0){ autoSelectWeek(); renderAll(); }
    else{ showToast('Failed to load: '+err.message,true); setTimeout(loadAllData,5000); }
  }
  finally{document.getElementById('loadingState').style.display='none';}
}
function autoSelectWeek(){const t=new Date();t.setHours(0,0,0,0);let b=0,bd=Infinity;calendar.forEach((w,i)=>{const m=parseDate(w.mondayDate);if(!m)return;const f=new Date(m);f.setDate(f.getDate()+4);if(t>=m&&t<=f){b=i;bd=0;}else{const d=Math.abs(t-m);if(d<bd){bd=d;b=i;}}});currentWeekIndex=b;}
function getWeekDates(wi){const w=calendar[wi];if(!w)return[];const m=parseDate(w.mondayDate);if(!m)return[];return Array.from({length:5},(_,i)=>{const d=new Date(m);d.setDate(d.getDate()+i);return d;});}
function fmtDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtShort(d){return(d.getMonth()+1)+'/'+d.getDate();}
function getFilteredStudents(){const f=document.getElementById('statusFilter').value;return f==='all'?students:students.filter(s=>s.status===f);}

// ─── Compute week stats for a student ───
function computeWeek(name, ds, today){
  let presentDays=0, passedDays=0, absentDays=0;
  ds.forEach(d=>{
    if(d>today)return;
    const dk=fmtDate(d);
    if(isAbsent(name,dk)){absentDays++;return;}
    presentDays++;
    const ci=checkIns[ciKey(name,dk)]||{};
    if(CATEGORIES.filter(c=>ci[c]).length>=DAY_PASS) passedDays++;
  });
  const threshold=weekPassThreshold(presentDays);
  const passed=presentDays>0&&passedDays>=threshold;
  return{presentDays,passedDays,absentDays,threshold,passed};
}

// ─── Save System: localStorage instant + background API sync ───
var _syncTimers = {};
var _syncInFlight = {};

function saveAndSync(name, date) {
  // Step 1: Save to localStorage INSTANTLY (this is what survives refresh)
  saveToLocal();

  // Step 2: Queue background sync to Google Sheets (debounced 2s)
  const timerKey = name + '-' + date;
  clearTimeout(_syncTimers[timerKey]);
  _syncTimers[timerKey] = setTimeout(function() { bgSync(name, date); }, 2000);
}

async function bgSync(name, date) {
  const timerKey = name + '-' + date;
  if (_syncInFlight[timerKey]) return; // skip if already syncing
  _syncInFlight[timerKey] = true;

  const key = ciKey(name, date);
  const ci = checkIns[key] || {};
  const absent = isAbsent(name, date);

  try {
    await apiPost({
      action: 'saveRow',
      studentName: name, date: date,
      Math: !!ci.Math, Chinese: !!ci.Chinese,
      Journal: !!ci.Journal, Homework: !!ci.Homework,
      Absent: absent
    });
    console.log('Synced to sheets:', name, date);
  } catch(e) {
    console.error('Sync failed:', name, date, e);
    // Retry once after 5 seconds
    setTimeout(function() { bgSync(name, date); }, 5000);
  } finally {
    _syncInFlight[timerKey] = false;
  }
}

// Sync all pending changes before user leaves the page
window.addEventListener('beforeunload', function() {
  Object.keys(_syncTimers).forEach(function(key) {
    clearTimeout(_syncTimers[key]);
    // Fire sync immediately for any pending changes
    const [name, ...dateParts] = key.split('-');
    // Can't do async here, so use sendBeacon as last resort
  });
});

}

    });
    doc.autoTable({startY:y,head:[['Day','Math','Chinese','Journal','Homework','Status']],body:tbl,theme:'grid',styles:{fontSize:10,cellPadding:4},headStyles:{fillColor:[45,90,61]}});
    y=doc.lastAutoTable.finalY+12;const thr=weekPassThreshold(pDays),wp=pDays>0&&pPass>=thr;
    doc.setFontSize(13);doc.setTextColor(wp?39:192,wp?174:57,wp?96:43);
    doc.text('Week: '+pPass+'/'+pDays+' days passed (need '+thr+') - '+(wp?'PASSED':'NOT YET PASSED'),14,y);
  }else if(type==='monthly'){
    doc.setFontSize(12);doc.setTextColor(107,107,107);doc.text('Monthly Report (Last 4 Weeks)',14,y);y+=12;const tbl=[];
    for(let wi=Math.max(0,currentWeekIndex-3);wi<=currentWeekIndex;wi++){const w=calendar[wi],ds=getWeekDates(wi),today=new Date();today.setHours(0,0,0,0);
      let pd=0,pp=0,cc={},ab=0;CATEGORIES.forEach(c=>cc[c]=0);
      ds.forEach(d=>{if(d>today)return;const dk=fmtDate(d);if(isAbsent(s.name,dk)){ab++;return;}pd++;const ci=checkIns[ciKey(s.name,dk)]||{};let cn=0;CATEGORIES.forEach(c=>{if(ci[c]){cc[c]++;cn++;}});if(cn>=DAY_PASS)pp++;});
      const thr=weekPassThreshold(pd),p=pd>0&&pp>=thr;
      tbl.push([w?.label||'Week',cc.Math+'/'+pd,cc.Chinese+'/'+pd,cc.Journal+'/'+pd,cc.Homework+'/'+pd,pp+'/'+pd+(p?' PASS':'')+(ab?' ('+ab+' abs)':'')]);
    }
    doc.autoTable({startY:y,head:[['Week','Math','Chinese','Journal','Homework','Status']],body:tbl,theme:'grid',styles:{fontSize:10,cellPadding:4},headStyles:{fillColor:[45,90,61]}});
  }else if(type==='unit'){
    const um=(calendar[currentWeekIndex]?.label||'').match(/Unit\s*(\d+)/i),un=um?um[1]:'?';
    doc.setFontSize(12);doc.setTextColor(107,107,107);doc.text('Unit '+un+' Report',14,y);y+=12;
    const uw=calendar.map((w,i)=>({...w,idx:i})).filter(w=>{const m=(w.label||'').match(/Unit\s*(\d+)/i);return m&&m[1]===un;}),tbl=[];let uwp=0;
    uw.forEach(u=>{const ds=getWeekDates(u.idx),today=new Date();today.setHours(0,0,0,0);let pd=0,pp=0,ab=0;
      ds.forEach(d=>{if(d>today)return;const dk=fmtDate(d);if(isAbsent(s.name,dk)){ab++;return;}pd++;const ci=checkIns[ciKey(s.name,dk)]||{};if(CATEGORIES.filter(c=>ci[c]).length>=DAY_PASS)pp++;});
      const thr=weekPassThreshold(pd),p=pd>0&&pp>=thr;if(p)uwp++;
      tbl.push([u.label,pp+'/'+pd+(ab?' ('+ab+' abs)':''),p?'PASS':'NOT PASS']);
    });
    doc.autoTable({startY:y,head:[['Week','Days Passed','Status']],body:tbl,theme:'grid',styles:{fontSize:10,cellPadding:4},headStyles:{fillColor:[45,90,61]}});
    y=doc.lastAutoTable.finalY+12;doc.setFontSize(12);doc.setTextColor(44,44,44);doc.text('Unit Summary: '+uwp+'/'+uw.length+' weeks passed',14,y);
  }
  doc.setFontSize(8);doc.setTextColor(150,150,150);doc.text('MSLC Assignment Tracker',14,doc.internal.pageSize.height-10);
  doc.save(s.name.replace(/[^a-zA-Z0-9]/g,'_')+'_'+type+'_report.pdf');showToast(type.charAt(0).toUpperCase()+type.slice(1)+' report downloaded!');
}

// ─── Calendar Modal ───
function openCalendarModal(){document.getElementById('calendarModal').classList.add('active');renderCalTable();}
function closeCalendarModal(){document.getElementById('calendarModal').classList.remove('active');}
function renderCalTable(){if(!calendar.length){document.getElementById('calendarBody').innerHTML='<p>No calendar data.</p>';return;}let h='<table class="cal-table"><thead><tr><th>#</th><th>Week</th><th>Monday</th><th>Status</th></tr></thead><tbody>';calendar.forEach((w,i)=>{const ic=i===currentWeekIndex,m=parseDate(w.mondayDate),ds=m?m.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):w.mondayDate;h+=`<tr class="${ic?'active-week':''}"><td>${i+1}</td><td>${esc(w.label)}</td><td>${ds}</td><td>${w.active?'\u{1F7E2} Active':'\u26AA Inactive'}${ic?' <span class="cal-active-badge">Current</span>':''}</td></tr>`;});h+='</tbody></table>';document.getElementById('calendarBody').innerHTML=h;setTimeout(()=>{const r=document.querySelector('.active-week');if(r)r.scrollIntoView({block:'center',behavior:'smooth'});},100);}

// ─── Utils ───
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function showToast(m,e){const t=document.getElementById('toast');t.textContent=m;t.className='toast show'+(e?' error':'');clearTimeout(window._tt);window._tt=setTimeout(()=>t.className='toast',4000);}
async function refreshData(){showToast('Refreshing...');await loadAllData();showToast('Data refreshed!');}
document.getElementById('calendarModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeCalendarModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeCalendarModal();if(document.getElementById('mainPage').style.display!=='none'){if(e.key==='ArrowLeft')changeWeek(-1);if(e.key==='ArrowRight')changeWeek(1);}});
loadAllData();
</script>
