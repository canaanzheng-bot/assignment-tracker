<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSLC Assignment Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
:root {
  --bg: #F8F6F1;
  --card: #FFFFFF;
  --primary: #2D5A3D;
  --primary-light: #E8F0EB;
  --primary-hover: #3D7A52;
  --accent: #D4845A;
  --accent-light: #FFF0E8;
  --text: #2C2C2C;
  --text-secondary: #6B6B6B;
  --text-muted: #9A9A9A;
  --border: #E8E4DE;
  --border-light: #F0EDE8;
  --danger: #C0392B;
  --danger-light: #FDECEA;
  --success: #27AE60;
  --success-light: #E8F8F0;
  --warning: #F39C12;
  --warning-light: #FFF8E8;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.08), 0 4px 8px rgba(0,0,0,0.04);
  --radius: 10px;
  --radius-lg: 16px;
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
}

.header {
  background: var(--primary);
  color: white;
  padding: 0 32px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}

.header-left { display: flex; align-items: center; gap: 14px; }

.header-logo {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.header-divider { width: 1px; height: 28px; background: rgba(255,255,255,0.25); }
.header-subtitle { font-size: 13px; opacity: 0.8; font-weight: 400; }
.header-actions { display: flex; align-items: center; gap: 10px; }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 8px; font-size: 13px;
  font-weight: 500; font-family: inherit; cursor: pointer;
  border: none; transition: var(--transition); white-space: nowrap;
}
.btn-ghost { background: rgba(255,255,255,0.12); color: white; border: 1px solid rgba(255,255,255,0.15); }
.btn-ghost:hover { background: rgba(255,255,255,0.22); }
.btn-solid { background: var(--primary); color: white; }
.btn-solid:hover { background: var(--primary-hover); }
.btn-outline { background: transparent; color: var(--primary); border: 1.5px solid var(--border); }
.btn-outline:hover { background: var(--primary-light); border-color: var(--primary); }
.btn-sm { padding: 5px 10px; font-size: 12px; }

.back-btn {
  display: none; align-items: center; gap: 6px;
  background: none; border: none; color: white;
  font-family: inherit; font-size: 14px; cursor: pointer; padding: 6px 0; opacity: 0.9;
}
.back-btn:hover { opacity: 1; }
.back-btn svg { width: 18px; height: 18px; }

.main { max-width: 1200px; margin: 0 auto; padding: 28px 32px 60px; }

.week-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }

.week-nav {
  display: flex; align-items: center; gap: 2px;
  background: var(--card); border-radius: var(--radius);
  border: 1px solid var(--border); box-shadow: var(--shadow-sm); overflow: hidden;
}

.week-nav-btn {
  background: none; border: none; padding: 10px 12px; cursor: pointer;
  color: var(--text-secondary); transition: var(--transition); display: flex; align-items: center;
}
.week-nav-btn:hover { background: var(--primary-light); color: var(--primary); }
.week-nav-btn svg { width: 16px; height: 16px; }

.week-label {
  font-weight: 600; font-size: 15px; padding: 0 8px;
  min-width: 200px; text-align: center; color: var(--text);
}
.week-date { font-size: 13px; color: var(--text-muted); font-weight: 400; }
.week-bar-right { margin-left: auto; display: flex; gap: 8px; }

.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }

.stat-card {
  background: var(--card); border-radius: var(--radius);
  padding: 18px 20px; border: 1px solid var(--border); box-shadow: var(--shadow-sm);
}
.stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 500; margin-bottom: 6px; }
.stat-value { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 700; color: var(--text); }
.stat-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

.table-card {
  background: var(--card); border-radius: var(--radius-lg);
  border: 1px solid var(--border); box-shadow: var(--shadow-md); overflow: hidden;
}
.table-header {
  padding: 18px 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.table-title { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; }
.table-scroll { overflow-x: auto; }

table { width: 100%; border-collapse: collapse; min-width: 700px; }

thead th {
  padding: 12px 10px; font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.7px; color: var(--text-muted);
  background: #FAFAF7; border-bottom: 1px solid var(--border);
  text-align: center; white-space: nowrap;
}
thead th:first-child { text-align: left; padding-left: 24px; }

.day-col-group { border-left: 2px solid var(--border); }
.day-header { font-size: 12px; font-weight: 600; color: var(--text); text-transform: none; letter-spacing: 0; }
.day-date { font-size: 10px; color: var(--text-muted); font-weight: 400; }

tbody tr { border-bottom: 1px solid var(--border-light); transition: var(--transition); }
tbody tr:hover { background: #FCFBF8; }
tbody tr:last-child { border-bottom: none; }
td { padding: 6px 10px; text-align: center; vertical-align: middle; }
td:first-child { text-align: left; padding-left: 24px; }

.student-name-cell { display: flex; align-items: center; gap: 10px; }

.student-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 600; color: white; flex-shrink: 0;
}

.student-name-link {
  font-weight: 500; font-size: 14px; color: var(--primary);
  cursor: pointer; text-decoration: none; transition: var(--transition);
}
.student-name-link:hover { color: var(--primary-hover); text-decoration: underline; }
.student-emoji { font-size: 13px; margin-left: 2px; }

.check-btn {
  width: 34px; height: 34px; border-radius: 8px; border: 2px solid var(--border);
  background: var(--card); cursor: pointer; display: inline-flex;
  align-items: center; justify-content: center; transition: var(--transition);
  font-size: 16px; line-height: 1;
}
.check-btn:hover { border-color: var(--primary); background: var(--primary-light); transform: scale(1.08); }
.check-btn.checked { background: var(--success); border-color: var(--success); color: white; }
.check-btn.checked:hover { background: #219a52; border-color: #219a52; }

.cat-label { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; display: block; margin-bottom: 2px; }
.cat-math { color: #8E44AD; }
.cat-chinese { color: #C0392B; }
.cat-journal { color: #2980B9; }
.cat-homework { color: #D4845A; }

.week-total-cell { font-family: 'Fraunces', serif; font-weight: 700; font-size: 16px; }
.week-pass { color: var(--success); background: var(--success-light); border-radius: 20px; padding: 4px 12px; display: inline-block; }
.week-fail { color: var(--danger); background: var(--danger-light); border-radius: 20px; padding: 4px 12px; display: inline-block; }
.week-partial { color: var(--warning); background: var(--warning-light); border-radius: 20px; padding: 4px 12px; display: inline-block; }

#studentPage { display: none; }

.student-hero {
  background: var(--card); border-radius: var(--radius-lg);
  border: 1px solid var(--border); box-shadow: var(--shadow-md);
  padding: 28px 32px; margin-bottom: 24px;
  display: flex; align-items: center; gap: 24px;
}
.hero-avatar {
  width: 68px; height: 68px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 700; color: white; flex-shrink: 0;
}
.hero-info { flex: 1; }
.hero-name { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 700; margin-bottom: 4px; }
.hero-meta { font-size: 13px; color: var(--text-secondary); }
.hero-stats { display: flex; gap: 24px; }
.hero-stat { text-align: center; }
.hero-stat-value { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 700; }
.hero-stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
.detail-card {
  background: var(--card); border-radius: var(--radius-lg);
  border: 1px solid var(--border); box-shadow: var(--shadow-sm); padding: 24px;
}
.detail-card-full { grid-column: 1 / -1; }
.detail-card-title {
  font-family: 'Fraunces', serif; font-size: 16px;
  font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
}

.ring-container { display: flex; align-items: center; gap: 32px; justify-content: center; padding: 10px 0; }
.ring-wrap { position: relative; width: 140px; height: 140px; }
.ring-wrap svg { transform: rotate(-90deg); width: 140px; height: 140px; }
.ring-bg { fill: none; stroke: var(--border); stroke-width: 10; }
.ring-fill { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
.ring-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
.ring-pct { font-family: 'Fraunces', serif; font-size: 30px; font-weight: 700; display: block; }
.ring-label { font-size: 11px; color: var(--text-muted); }

.bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 160px; padding-top: 10px; }
.bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; justify-content: flex-end; }
.bar-stack { width: 100%; max-width: 48px; display: flex; flex-direction: column; gap: 2px; }
.bar-segment { border-radius: 4px; min-height: 3px; transition: all 0.4s ease; }
.bar-day-label { font-size: 11px; font-weight: 500; color: var(--text-secondary); }
.bar-count { font-size: 11px; font-weight: 600; color: var(--text); }

.cat-breakdown { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.cat-stat { background: #FAFAF7; border-radius: var(--radius); padding: 14px 16px; border: 1px solid var(--border-light); }
.cat-stat-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.cat-stat-name { font-size: 13px; font-weight: 600; }
.cat-stat-pct { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 700; }
.cat-stat-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.cat-stat-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }

.heatmap-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: 8px; }
.heatmap-cell {
  aspect-ratio: 1; border-radius: 6px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 500; border: 1px solid transparent;
  transition: var(--transition); cursor: default;
}
.heatmap-cell:hover { transform: scale(1.05); }
.heatmap-cell .hm-day { font-weight: 600; font-size: 11px; }
.heatmap-cell .hm-count { font-size: 9px; opacity: 0.8; }
.hm-0 { background: #F5F5F0; color: var(--text-muted); border-color: var(--border-light); }
.hm-1 { background: #FFF3CD; color: #856404; }
.hm-2 { background: #FFEAA7; color: #7D6608; }
.hm-3 { background: #D5F5E3; color: #1E8449; }
.hm-4 { background: #82E0AA; color: #1B6B38; }

.heatmap-legend { display: flex; align-items: center; gap: 6px; margin-top: 12px; font-size: 11px; color: var(--text-muted); }
.heatmap-legend-swatch { width: 14px; height: 14px; border-radius: 3px; }

.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.45); z-index: 200;
  align-items: center; justify-content: center; backdrop-filter: blur(4px);
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--card); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg); max-width: 640px; width: 90%;
  max-height: 80vh; overflow: hidden; display: flex; flex-direction: column;
}
.modal-header {
  padding: 20px 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; }
.modal-close {
  background: none; border: none; cursor: pointer; color: var(--text-muted);
  padding: 4px; border-radius: 6px; transition: var(--transition);
}
.modal-close:hover { background: #f0f0f0; color: var(--text); }
.modal-body { padding: 24px; overflow-y: auto; flex: 1; }
.modal-footer {
  padding: 16px 24px; border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 10px;
}

.cal-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.cal-table th {
  padding: 8px 10px; text-align: left; font-weight: 600;
  background: #FAFAF7; border-bottom: 1px solid var(--border);
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted);
}
.cal-table td { padding: 8px 10px; border-bottom: 1px solid var(--border-light); text-align: left; }
.cal-table tr.active-week td { background: var(--primary-light); font-weight: 500; }
.cal-active-badge {
  display: inline-block; background: var(--primary); color: white;
  font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600;
}

.loading-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.spinner {
  width: 36px; height: 36px; border: 3px solid var(--border);
  border-top-color: var(--primary); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--text); color: white; padding: 12px 20px;
  border-radius: var(--radius); font-size: 13px; font-weight: 500;
  box-shadow: var(--shadow-lg); z-index: 300;
  opacity: 0; transform: translateY(10px); transition: all 0.3s ease; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }

@media (max-width: 768px) {
  .main { padding: 16px; }
  .stats-row { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .detail-grid { grid-template-columns: 1fr; }
  .header { padding: 0 16px; }
  .student-hero { flex-direction: column; text-align: center; padding: 20px; }
  .hero-stats { justify-content: center; }
  .ring-container { flex-direction: column; }
  .cat-breakdown { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <button class="back-btn" id="backBtn" onclick="showMainPage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      Back
    </button>
    <div class="header-logo">MSLC</div>
    <div class="header-divider"></div>
    <div class="header-subtitle" id="headerSubtitle">Assignment Tracker</div>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="openCalendarModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Calendar
    </button>
    <button class="btn btn-ghost" onclick="refreshData()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Refresh
    </button>
  </div>
</header>

<div id="mainPage" class="main">
  <div class="week-bar">
    <div class="week-nav">
      <button class="week-nav-btn" onclick="changeWeek(-1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="week-label" id="weekLabel">Loading...</div>
      <button class="week-nav-btn" onclick="changeWeek(1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="week-bar-right">
      <button class="btn btn-outline btn-sm" onclick="goToCurrentWeek()">Today</button>
    </div>
  </div>

  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="stat-label">Students</div><div class="stat-value" id="statStudents">&mdash;</div></div>
    <div class="stat-card"><div class="stat-label">Week Completion</div><div class="stat-value" id="statWeekComp">&mdash;</div><div class="stat-sub" id="statWeekSub"></div></div>
    <div class="stat-card"><div class="stat-label">Today's Check-ins</div><div class="stat-value" id="statToday">&mdash;</div><div class="stat-sub" id="statTodaySub"></div></div>
    <div class="stat-card"><div class="stat-label">Weekly Pass Rate</div><div class="stat-value" id="statPassRate">&mdash;</div><div class="stat-sub" id="statPassSub"></div></div>
  </div>

  <div class="table-card">
    <div class="table-header">
      <div class="table-title">\u{1F4CB} Weekly Check-in</div>
    </div>
    <div class="table-scroll">
      <table><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table>
    </div>
  </div>

  <div class="loading-state" id="loadingState">
    <div class="spinner"></div>
    <div>Loading assignment data...</div>
  </div>
</div>

<div id="studentPage" class="main"></div>

<div class="modal-overlay" id="calendarModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">\u{1F4C5} School Calendar</div>
      <button class="modal-close" onclick="closeCalendarModal()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="calendarBody"><div class="loading-state"><div class="spinner"></div>Loading calendar...</div></div>
    <div class="modal-footer">
      <div style="font-size:12px;color:var(--text-muted);flex:1;">Calendar is managed in Google Sheets</div>
      <button class="btn btn-outline" onclick="closeCalendarModal()">Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzr2z1ERKXAzYfyF2Ex3MQNjTEs-g6AxhmhfTZyhrkiz3znfjyuitERlpOKyzvR-fas/exec';
const CATEGORIES = ['Math', 'Chinese', 'Journal', 'Homework'];
const CAT_COLORS = { Math: '#8E44AD', Chinese: '#C0392B', Journal: '#2980B9', Homework: '#D4845A' };
const CAT_ICONS = { Math: '\u{1F522}', Chinese: '\u{1F004}', Journal: '\u{1F4D3}', Homework: '\u{1F4DA}' };
const DAYS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'];
const AVATAR_COLORS = [
  '#2D5A3D','#8E44AD','#2980B9','#C0392B','#D4845A',
  '#1ABC9C','#E67E22','#3498DB','#E74C3C','#9B59B6',
  '#16A085','#F39C12','#2ECC71','#E91E63','#00BCD4'
];
const DAY_PASS = 3;
const WEEK_PASS = 4;

let students = [];
let checkIns = {};
let calendar = [];
let currentWeekIndex = 0;

// ── API ──
async function apiGet(action, params = {}) {
  const u = new URL(API);
  u.searchParams.set('action', action);
  for (const [k,v] of Object.entries(params)) u.searchParams.set(k, v);
  const r = await fetch(u.toString());
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

async function apiPost(data) {
  const r = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(data)
  });
  return r.json();
}

// ── Data Loading ──
async function loadAllData() {
  document.getElementById('loadingState').style.display = 'block';
  try {
    const [sData, ciData, calData] = await Promise.all([
      apiGet('getStudents'), apiGet('getCheckIns'), apiGet('getCalendar')
    ]);
    students = sData || [];
    calendar = calData || [];
    checkIns = {};
    if (Array.isArray(ciData)) {
      ciData.forEach(ci => {
        const key = ci.studentId + '-' + ci.date;
        if (!checkIns[key]) checkIns[key] = {};
        CATEGORIES.forEach(cat => {
          if (ci[cat] === true || ci[cat] === 'TRUE' || ci[cat] === 1 || ci[cat] === '1') {
            checkIns[key][cat] = true;
          }
        });
        if (ci.category && ci.done) checkIns[key][ci.category] = true;
      });
    }
    autoSelectWeek();
    renderAll();
  } catch (err) {
    console.error('Load error:', err);
    showToast('Failed to load data. Retrying...');
    setTimeout(loadAllData, 3000);
  } finally {
    document.getElementById('loadingState').style.display = 'none';
  }
}

function parseDate(str) {
  if (!str) return null;
  if (str instanceof Date) return new Date(str.getFullYear(), str.getMonth(), str.getDate());
  let d = new Date(str);
  if (!isNaN(d)) return new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const p = str.split('/');
  if (p.length === 3) { d = new Date(p[2], p[0]-1, p[1]); if (!isNaN(d)) return d; }
  return null;
}

function autoSelectWeek() {
  const today = new Date(); today.setHours(0,0,0,0);
  let best = 0, bestD = Infinity;
  calendar.forEach((w, i) => {
    const m = parseDate(w.mondayDate); if (!m) return;
    const f = new Date(m); f.setDate(f.getDate()+4);
    if (today >= m && today <= f) { best = i; bestD = 0; }
    else { const d = Math.abs(today-m); if (d < bestD) { bestD = d; best = i; } }
  });
  currentWeekIndex = best;
}

function getWeekDates(wi) {
  const w = calendar[wi]; if (!w || !w.mondayDate) return [];
  const m = parseDate(w.mondayDate); if (!m) return [];
  return Array.from({length:5}, (_,i) => { const d = new Date(m); d.setDate(d.getDate()+i); return d; });
}

function fmtDate(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtShort(d) { return (d.getMonth()+1)+'/'+d.getDate(); }

// ── Render Main ──
function renderAll() { renderWeekLabel(); renderTableHeader(); renderTableBody(); renderStats(); }

function renderWeekLabel() {
  const w = calendar[currentWeekIndex];
  const l = w ? w.label : 'Week '+(currentWeekIndex+1);
  const ds = getWeekDates(currentWeekIndex);
  const dr = ds.length ? fmtShort(ds[0])+' \u2013 '+fmtShort(ds[4]) : '';
  document.getElementById('weekLabel').innerHTML = l+'<br><span class="week-date">'+dr+'</span>';
}

function renderTableHeader() {
  const ds = getWeekDates(currentWeekIndex);
  const today = new Date(); today.setHours(0,0,0,0);
  let h = '<tr><th style="min-width:160px">Student</th>';
  ds.forEach((d,i) => {
    const isT = d.getTime()===today.getTime();
    h += '<th class="day-col-group" colspan="4" style="'+(isT?'color:var(--primary);':'')+'"><div class="day-header">'+DAYS[i]+(isT?' \u2726':'')+'</div><div class="day-date">'+fmtShort(d)+'</div></th>';
  });
  h += '<th style="min-width:80px">Week</th></tr>';
  h += '<tr><th></th>';
  for (let i=0;i<5;i++) CATEGORIES.forEach((c,ci) => {
    const a = c==='Homework'?'HW':c.substring(0,2);
    h += '<th class="'+(ci===0?'day-col-group':'')+'" style="padding:4px 2px;"><span class="cat-label cat-'+c.toLowerCase()+'">'+a+'</span></th>';
  });
  h += '<th></th></tr>';

}

function renderTableBody() {
  const ds = getWeekDates(currentWeekIndex);
  const today = new Date(); today.setHours(0,0,0,0);
  let h = '';
  students.forEach((s,si) => {
    const col = AVATAR_COLORS[si%AVATAR_COLORS.length];
    const init = (s.name||'?')[0].toUpperCase();
    const emoji = s.emoji||'';
    let wd = 0;
    h += '<tr><td><div class="student-name-cell"><div class="student-avatar" style="background:'+col+'">'+init+'</div><a class="student-name-link" onclick="showStudentPage(\''+s.id+'\')">'+esc(s.name)+'</a><span class="student-emoji">'+emoji+'</span></div></td>';
    ds.forEach((d,di) => {
      const dk = fmtDate(d), key = s.id+'-'+dk;
      const ci = checkIns[key]||{};
      let dc = 0;
      CATEGORIES.forEach((cat,catI) => {
        const chk = !!ci[cat]; if (chk) dc++;
        const cls = catI===0?'day-col-group':'';
        const fut = d>today;
        h += '<td class="'+cls+'" style="padding:4px 2px;"><button class="check-btn'+(chk?' checked':'')+'"'+(fut?' disabled style="opacity:0.3;cursor:default;"':'')+' onclick="toggleCheck(\''+s.id+'\',\''+dk+'\',\''+cat+'\',this)" title="'+cat+'">'+(chk?'\u2713':'')+'</button></td>';
      });
      if (dc>=DAY_PASS) wd++;
    });
    let wc='week-fail'; if(wd>=WEEK_PASS) wc='week-pass'; else if(wd>=2) wc='week-partial';
    h += '<td class="week-total-cell"><span class="'+wc+'">'+wd+'/5</span></td></tr>';
  });
  document.getElementById('tableBody').innerHTML = h;
}

function renderStats() {
  const ds = getWeekDates(currentWeekIndex);
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = fmtDate(today);
  document.getElementById('statStudents').textContent = students.length;
  let totDay=0, totPoss=0, todayComp=0, weekPassCnt=0;
  students.forEach(s => {
    let wd=0;
    ds.forEach(d => {
      if(d>today) return; totPoss++;
      const k=s.id+'-'+fmtDate(d), ci=checkIns[k]||{};
      if(CATEGORIES.filter(c=>ci[c]).length>=DAY_PASS){totDay++;wd++;}
    });
    const tk=s.id+'-'+todayStr, tci=checkIns[tk]||{};
    if(CATEGORIES.filter(c=>tci[c]).length>=DAY_PASS) todayComp++;
    if(wd>=WEEK_PASS) weekPassCnt++;
  });
  const wp = totPoss>0?Math.round(totDay/totPoss*100):0;
  document.getElementById('statWeekComp').textContent = wp+'%';
  document.getElementById('statWeekSub').textContent = totDay+' of '+totPoss+' student-days';
  document.getElementById('statToday').textContent = todayComp;
  document.getElementById('statTodaySub').textContent = 'of '+students.length+' students';
  const pr = students.length>0?Math.round(weekPassCnt/students.length*100):0;
  document.getElementById('statPassRate').textContent = pr+'%';
  document.getElementById('statPassSub').textContent = weekPassCnt+' of '+students.length+' passed';
}

// ── Toggle Check ──
async function toggleCheck(sid, date, cat, btn) {
  const key = sid+'-'+date;
  if(!checkIns[key]) checkIns[key]={};
  const nv = !checkIns[key][cat];
  checkIns[key][cat] = nv;
  if(nv){btn.classList.add('checked');btn.textContent='\u2713';}
  else{btn.classList.remove('checked');btn.textContent='';}
  clearTimeout(window._st);
  window._st = setTimeout(()=>{renderStats();updateWeekTotals();},100);
  try{await apiPost({action:'saveCheckIn',studentId:sid,date,category:cat,done:nv});}
  catch(e){console.error(e);showToast('Save failed');}
}

function updateWeekTotals() {
  const ds = getWeekDates(currentWeekIndex);
  const today = new Date(); today.setHours(0,0,0,0);
  document.querySelectorAll('#tableBody tr').forEach((row,i) => {
    if(!students[i]) return;
    const s=students[i]; let wd=0;
    ds.forEach(d=>{if(d>today)return;const k=s.id+'-'+fmtDate(d),ci=checkIns[k]||{};if(CATEGORIES.filter(c=>ci[c]).length>=DAY_PASS)wd++;});
    const td=row.querySelector('td:last-child');
    if(td){let c='week-fail';if(wd>=WEEK_PASS)c='week-pass';else if(wd>=2)c='week-partial';td.innerHTML='<span class="'+c+'">'+wd+'/5</span>';}
  });
}

// ── PDF ──
function genPDF(sid, type) {
  const s = students.find(x=>x.id===sid); if(!s) return;
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF();
  const pw = doc.internal.pageSize.width;

  doc.setFillColor(45,90,61);
  doc.rect(0,0,pw,32,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(18);
  doc.text('MSLC Assignment Tracker',14,16);
  doc.setFontSize(10);
  doc.text('Generated: '+new Date().toLocaleDateString(),14,24);
  doc.setTextColor(44,44,44);
  doc.setFontSize(16);
  doc.text(s.name+(s.emoji?' '+s.emoji:''),14,46);
  let y=54;

  if(type==='weekly'){
    const wl=calendar[currentWeekIndex]?calendar[currentWeekIndex].label:'Current Week';
    doc.setFontSize(12);doc.setTextColor(107,107,107);
    doc.text(wl+' - Weekly Report',14,y);y+=12;
    const ds=getWeekDates(currentWeekIndex);
    const today=new Date();today.setHours(0,0,0,0);
    const td=[]; let wd2=0;
    ds.forEach((d,i)=>{
      if(d>today)return;
      const k=sid+'-'+fmtDate(d),ci=checkIns[k]||{};
      const r=[DAYS[i]+' '+fmtShort(d), ci.Math?'Yes':'\u2014', ci.Chinese?'Yes':'\u2014', ci.Journal?'Yes':'\u2014', ci.Homework?'Yes':'\u2014'];
      const cnt=CATEGORIES.filter(c=>ci[c]).length;
      const p=cnt>=DAY_PASS; if(p) wd2++;
      r.push(cnt+'/4 '+(p?'PASS':''));
      td.push(r);
    });
    doc.autoTable({startY:y,head:[['Day','Math','Chinese','Journal','Homework','Status']],body:td,theme:'grid',styles:{fontSize:10,cellPadding:4},headStyles:{fillColor:[45,90,61]}});
    y=doc.lastAutoTable.finalY+12;
    const wp2=wd2>=WEEK_PASS;
    doc.setFontSize(13);doc.setTextColor(wp2?39:192,wp2?174:57,wp2?96:43);
    doc.text('Week Result: '+wd2+'/5 days \u2014 '+(wp2?'PASSED':'NOT YET PASSED'),14,y);
  } else if(type==='monthly'){
    doc.setFontSize(12);doc.setTextColor(107,107,107);
    doc.text('Monthly Report (Last 4 Weeks)',14,y);y+=12;
    const si2=Math.max(0,currentWeekIndex-3), td=[];
    for(let wi=si2;wi<=currentWeekIndex;wi++){
      const w=calendar[wi],ds=getWeekDates(wi),today=new Date();today.setHours(0,0,0,0);
      let wd3=0,cc={},dt=0;CATEGORIES.forEach(c=>cc[c]=0);
      ds.forEach(d=>{if(d>today)return;dt++;const k=sid+'-'+fmtDate(d),ci=checkIns[k]||{};let cn=0;CATEGORIES.forEach(c=>{if(ci[c]){cc[c]++;cn++;}});if(cn>=DAY_PASS)wd3++;});
      const p=wd3>=WEEK_PASS;
      td.push([w?w.label:'Week '+(wi+1),cc.Math+'/'+dt,cc.Chinese+'/'+dt,cc.Journal+'/'+dt,cc.Homework+'/'+dt,wd3+'/5 '+(p?'PASS':'')]);
    }
    doc.autoTable({startY:y,head:[['Week','Math','Chinese','Journal','Homework','Status']],body:td,theme:'grid',styles:{fontSize:10,cellPadding:4},headStyles:{fillColor:[45,90,61]}});
  } else if(type==='unit'){
    const cl=calendar[currentWeekIndex]?calendar[currentWeekIndex].label:'';
    const um=cl.match(/Unit\s*(\d+)/i), un=um?um[1]:'?';
    doc.setFontSize(12);doc.setTextColor(107,107,107);
    doc.text('Unit '+un+' Report',14,y);y+=12;
    const uw=calendar.map((w,i)=>({...w,idx:i})).filter(w=>{const m=(w.label||'').match(/Unit\s*(\d+)/i);return m&&m[1]===un;});
    const td=[]; let uwp=0;
    uw.forEach(u=>{
      const ds=getWeekDates(u.idx),today=new Date();today.setHours(0,0,0,0);
      let wd4=0;
      ds.forEach(d=>{if(d>today)return;const k=sid+'-'+fmtDate(d),ci=checkIns[k]||{};if(CATEGORIES.filter(c=>ci[c]).length>=DAY_PASS)wd4++;});
      const p=wd4>=WEEK_PASS;if(p)uwp++;
      td.push([u.label||'Week',wd4+'/5',p?'PASS':'NOT PASS']);
    });
    doc.autoTable({startY:y,head:[['Week','Days Passed','Status']],body:td,theme:'grid',styles:{fontSize:10,cellPadding:4},headStyles:{fillColor:[45,90,61]}});
    y=doc.lastAutoTable.finalY+12;
    doc.setFontSize(12);doc.setTextColor(44,44,44);
    doc.text('Unit Summary: '+uwp+'/'+uw.length+' weeks passed',14,y);
  }
  const ph=doc.internal.pageSize.height;
  doc.setFontSize(8);doc.setTextColor(150,150,150);
  doc.text('MSLC Assignment Tracker',14,ph-10);
  doc.text('Page 1',pw-24,ph-10);
  doc.save(s.name+'_'+type+'_report.pdf');
  showToast(type.charAt(0).toUpperCase()+type.slice(1)+' report downloaded!');
}

// ── Utils ──
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),3000);}
async function refreshData(){showToast('Refreshing...');await loadAllData();showToast('Data refreshed!');}

document.getElementById('calendarModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeCalendarModal();});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeCalendarModal();
  if(e.key==='ArrowLeft'&&document.getElementById('mainPage').style.display!=='none')changeWeek(-1);
  if(e.key==='ArrowRight'&&document.getElementById('mainPage').style.display!=='none')changeWeek(1);
});

loadAllData();
</script>
</body>
</html>
