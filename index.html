<body>

<script type="text/babel">
const {useState,useEffect,useMemo,useRef,useCallback}=React;

/* ════════ CONFIG ════════ */
const API_URL="https://script.google.com/macros/s/AKfycbzr2z1ERKXAzYfyF2Ex3MQNjTEs-g6AxhmhfTZyhrkiz3znfjyuitERlpOKyzvR-fas/exec";
const CATEGORIES=["Math","Chinese","Journal","Homework"];
const CAT_ICONS={Math:"\u03A3",Chinese:"\u5B57",Journal:"\u270E",Homework:"\uD83D\uDCCB"};
const CAT_COLORS={Math:{bg:"#EEF0FF",on:"#4F5BD5",bd:"#C7CAFF"},Chinese:{bg:"#FFF0F0",on:"#D5564F",bd:"#FFC7C7"},Journal:{bg:"#F0FFF4",on:"#38A169",bd:"#B2F5C7"},Homework:{bg:"#FFF8EE",on:"#D5944F",bd:"#FFE0B2"}};
const WKDAYS=["Mon","Tue","Wed","Thu","Fri"];

/* ════════ DATE HELPERS ════════ */
function getDayKey(d){return(d||new Date()).toISOString().split("T")[0]}
function safeDates(mon){if(!mon||typeof mon!=="string"||mon.length<10)return[];try{const s=new Date(mon+"T00:00:00");if(isNaN(s.getTime()))return[];return Array.from({length:5},(_,i)=>{const d=new Date(s);d.setDate(d.getDate()+i);return d.toISOString().split("T")[0]})}catch(e){return[]}}
function isDayDone(c){return c?Object.values(c).filter(Boolean).length>=3:false}
function countDone(sr,wd){let n=0;for(const d of wd)if(isDayDone(sr?.[d]))n++;return n}

/* ════════ DEFAULT CALENDAR (33 weeks) ════════ */
function defaultCalendar(){
  const labels=[];
  for(let u=1;u<=3;u++){
    labels.push({label:`Unit ${u} \u5B66\u524D\u590D\u4E60`,mondayDate:"",active:true});
    for(let w=1;w<=4;w++)labels.push({label:`Unit ${u} Week ${w}`,mondayDate:"",active:true});
    labels.push({label:`Unit ${u} \u671F\u4E2D\u590D\u4E60`,mondayDate:"",active:true});
    for(let w=5;w<=8;w++)labels.push({label:`Unit ${u} Week ${w}`,mondayDate:"",active:true});
    labels.push({label:`Unit ${u} \u671F\u672B\u590D\u4E60`,mondayDate:"",active:true});
  }
  return labels;
}

/* ════════ FIND CURRENT SCHOOL WEEK ════════ */
function findCurrentSchoolWeek(cal){
  if(!cal||cal.length===0)return 0;
  const today=getDayKey();
  for(let i=0;i<cal.length;i++){
    const dates=safeDates(cal[i].mondayDate);
    if(dates.length===5&&today>=dates[0]&&today<=dates[4])return i;
  }
  let best=0,bestDiff=Infinity;
  for(let i=0;i<cal.length;i++){
    if(!cal[i].mondayDate)continue;
    try{const diff=Math.abs(new Date(today)-new Date(cal[i].mondayDate));if(diff<bestDiff){bestDiff=diff;best=i}}catch(e){}
  }
  return best;
}

/* ════════ ALERTS ════════ */
const AL={none:{c:"transparent",bg:"transparent",lb:"",ic:"",bd:"transparent"},yellow:{c:"#B8860B",bg:"#FFF8DC",bd:"#FFE066",lb:"Concern",ic:"\u26A0\uFE0F"},red:{c:"#C0392B",bg:"#FFF0F0",bd:"#FF8A8A",lb:"At Risk",ic:"\uD83D\uDD34"},purple:{c:"#6C3483",bg:"#F5EEFF",bd:"#C39BFF",lb:"Critical",ic:"\uD83D\uDFE3"}};
function getAlerts(name,records,cal){
  const sr=records[name]||{};const alerts=[];const today=new Date();const dow=today.getDay();
  const ci=findCurrentSchoolWeek(cal);const cw=cal[ci];
  const wd=safeDates(cw?.mondayDate);if(wd.length===0)return alerts;
  const cc=countDone(sr,wd);const todayStr=getDayKey();const rem=wd.filter(d=>d>=todayStr).length;
  if(dow>=5&&cc<4)alerts.push({level:"yellow",msg:`Only ${cc}/4 days this week`});
  else if(cc+rem<4&&dow>=1&&dow<=5)alerts.push({level:"yellow",msg:`Can only reach ${cc+rem}/4`});
  const activeWeeks=cal.filter(w=>w.mondayDate&&w.active);
  const curAi=activeWeeks.findIndex(w=>w.mondayDate===cw?.mondayDate);
  if(curAi>=0){
    const recent=activeWeeks.slice(Math.max(0,curAi-3),curAi+1);
    const wr=recent.map(w=>countDone(sr,safeDates(w.mondayDate))>=4);
    const inc=wr.filter(x=>!x).length;
    if(inc>=2)alerts.push({level:"red",msg:`${inc}/${wr.length} recent weeks incomplete`});
    if(wr.length>=4&&wr.every(x=>!x))alerts.push({level:"purple",msg:"4 weeks in a row"});
  }
  return alerts;
}
function topAlert(a){if(a.some(x=>x.level==="purple"))return"purple";if(a.some(x=>x.level==="red"))return"red";if(a.some(x=>x.level==="yellow"))return"yellow";return"none"}

/* ════════ API ════════ */
async function apiGet(a){const r=await fetch(`${API_URL}?action=${a}`);return r.json()}
async function apiPost(d){const r=await fetch(API_URL,{method:"POST",body:JSON.stringify(d)});return r.json()}

/* ════════ SMALL COMPONENTS ════════ */
function CatBtn({cat,on,toggle,sm}){const co=CAT_COLORS[cat];return <button onClick={toggle} style={{display:"inline-flex",alignItems:"center",gap:sm?4:6,padding:sm?"4px 10px":"6px 14px",borderRadius:8,border:`2px solid ${on?co.on:co.bd}`,background:on?co.on:co.bg,color:on?"#fff":co.on,fontWeight:600,fontSize:sm?12:13,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",boxShadow:on?`0 2px 8px ${co.on}40`:"none"}}><span style={{fontSize:sm?13:15}}>{on?"\u2713":CAT_ICONS[cat]}</span>{cat}</button>}
function Badge({ok,label}){return <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:700,background:ok?"#E8F8EE":"#FFF3E6",color:ok?"#1B7A3D":"#B8600A",fontFamily:"'DM Sans',sans-serif",textTransform:"uppercase"}}><span style={{fontSize:8}}>{ok?"\u25CF":"\u25CB"}</span>{label}</span>}
function AlertBadge({level,compact}){if(level==="none")return null;const a=AL[level];return <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:compact?"2px 8px":"4px 12px",borderRadius:20,fontSize:compact?10:11,fontWeight:800,background:a.bg,color:a.c,border:`1.5px solid ${a.bd}`,fontFamily:"'DM Sans',sans-serif",textTransform:"uppercase"}}><span style={{fontSize:compact?10:12}}>{a.ic}</span>{a.lb}</span>}
function Ring({v,max,sz=65,sw=6,color="#4F5BD5"}){const r=(sz-sw)/2;const c=2*Math.PI*r;const p=(v/max)*c;return <svg width={sz} height={sz} style={{transform:"rotate(-90deg)"}}><circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke="#F0F0F5" strokeWidth={sw}/><circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke={color} strokeWidth={sw} strokeDasharray={c} strokeDashoffset={c-p} strokeLinecap="round" style={{transition:"stroke-dashoffset 0.6s"}}/></svg>}
function SyncBadge({s}){if(!s)return null;return <div className={`syncing-badge ${s}`}>{s==="saving"?"\u2601\uFE0F Saving...":s==="saved"?"\u2705 Synced":"\u274C Error"}</div>}

/* ════════ WEEK NAV DROPDOWN ════════ */
function WeekNav({cal,idx,setIdx,onSetup}){
  const hasDates=cal.some(c=>c.mondayDate);
  const fmtR=m=>{const d=safeDates(m);if(d.length<5)return"";const f=x=>new Date(x+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});return`${f(d[0])} \u2013 ${f(d[4])}`};
  const todayIdx=findCurrentSchoolWeek(cal);
  return <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
    {hasDates&&<>
      <button onClick={()=>setIdx(Math.max(0,idx-1))} style={{width:30,height:30,borderRadius:"50%",border:"2px solid #E0E0E8",background:"#fff",cursor:"pointer",fontSize:13,color:"#666",display:"flex",alignItems:"center",justifyContent:"center"}}>\u25C2</button>
      <select className="week-select" value={idx} onChange={e=>setIdx(+e.target.value)}>
        {[1,2,3].map(u=><optgroup key={u} label={`\u2500\u2500 Unit ${u} \u2500\u2500`}>
          {cal.map((c,i)=>{if(!c.label.startsWith(`Unit ${u} `))return null;const isCur=i===todayIdx;return <option key={i} value={i} disabled={!c.active||!c.mondayDate}>{c.label}{c.mondayDate?` (${fmtR(c.mondayDate)})`:""}{isCur?" \u2190 TODAY":""}</option>})}
        </optgroup>)}
      </select>
      <button onClick={()=>setIdx(Math.min(cal.length-1,idx+1))} style={{width:30,height:30,borderRadius:"50%",border:"2px solid #E0E0E8",background:"#fff",cursor:"pointer",fontSize:13,color:"#666",display:"flex",alignItems:"center",justifyContent:"center"}}>\u25B8</button>
      {todayIdx!==idx&&<button onClick={()=>setIdx(todayIdx)} style={{padding:"6px 12px",borderRadius:8,border:"2px solid #4F5BD5",background:"#EEF0FF",color:"#4F5BD5",fontFamily:"'DM Sans',sans-serif",fontSize:11,fontWeight:700,cursor:"pointer"}}>\u2192 Today</button>}
    </>}
    <button onClick={onSetup} style={{padding:"6px 14px",borderRadius:8,border:"2px solid #D5944F",background:"#FFF8EE",color:"#B8600A",fontFamily:"'DM Sans',sans-serif",fontSize:11,fontWeight:700,cursor:"pointer"}}>\uD83D\uDCC5 Calendar</button>
  </div>;
}

/* ════════ DAY PICKER ════════ */
function DayPicker({wd,sel,setSel,label}){
  const today=getDayKey();if(!wd||wd.length===0)return null;
  return <div style={{background:"#fff",borderRadius:14,border:"1px solid #EEEEF2",padding:"12px 16px",marginBottom:20}}>
    <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
      <span style={{fontSize:12,fontWeight:700,color:"#666",textTransform:"uppercase"}}>\uD83D\uDCC5 {label||"Check-in:"}</span>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{wd.map((d,i)=>{
        const isT=d===today,isS=d===sel,isP=d<today,isF=d>today;
        return <button key={d} onClick={()=>setSel(d)} style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"8px 14px",borderRadius:10,cursor:"pointer",border:isS?"2px solid #4F5BD5":"2px solid #E8E8EE",background:isS?"linear-gradient(135deg,#4F5BD5,#7B68EE)":(isT?"#F5F5FF":"#fff"),color:isS?"#fff":(isF?"#ccc":"#444"),fontFamily:"'DM Sans',sans-serif",opacity:isF?0.5:1,minWidth:64,boxShadow:isS?"0 3px 12px rgba(79,91,213,0.3)":"none",position:"relative"}}><span style={{fontSize:12,fontWeight:800}}>{WKDAYS[i]}</span><span style={{fontSize:10,opacity:isS?0.9:0.7}}>{new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>{isT&&!isS&&<div style={{position:"absolute",top:-3,right:-3,width:8,height:8,borderRadius:"50%",background:"#4F5BD5",border:"2px solid #fff"}}/>}</button>})}</div>
      {sel!==today&&wd.includes(today)&&<button onClick={()=>setSel(today)} style={{background:"none",border:"none",cursor:"pointer",fontSize:11,fontWeight:700,color:"#4F5BD5",textDecoration:"underline"}}>\u2192 Today</button>}
    </div>
  </div>;
}

/* ════════ CALENDAR SETUP MODAL ════════ */
function CalModal({open,onClose,cal,onSave}){
  const [startDate,setStart]=useState("");
  const [lc,setLc]=useState([]);
  const [saving,setSaving]=useState(false);
  useEffect(()=>{if(open)setLc(cal.map(c=>({...c})))},[open]);
  const autoFill=()=>{if(!startDate)return;setLc(prev=>prev.map((c,i)=>{const d=new Date(startDate+"T00:00:00");d.setDate(d.getDate()+i*7);return{...c,mondayDate:d.toISOString().split("T")[0],active:true}}))};
  const save=async()=>{setSaving(true);try{await apiPost({action:"saveCalendar",calendar:lc});onSave(lc);onClose()}catch(e){alert("Save failed")}setSaving(false)};
  if(!open)return null;
  return <div style={{position:"fixed",inset:0,zIndex:1000,background:"rgba(20,20,40,0.45)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={onClose}>
    <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:20,width:"100%",maxWidth:600,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.18)"}}>
      <div style={{padding:"20px 28px",borderBottom:"1px solid #EEEEF2",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:"#fff",zIndex:1,borderRadius:"20px 20px 0 0"}}>
        <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:800,color:"#1A1A2E"}}>\uD83D\uDCC5 School Calendar Setup</h3>
        <button onClick={onClose} style={{width:32,height:32,borderRadius:"50%",border:"none",background:"#F5F5F8",cursor:"pointer",fontSize:16,color:"#999",display:"flex",alignItems:"center",justifyContent:"center"}}>\u2715</button>
      </div>
      <div style={{padding:"20px 28px"}}>
        <div style={{background:"#F5F5FF",borderRadius:12,padding:16,marginBottom:20,border:"1px solid #C7CAFF"}}>
          <div style={{fontSize:13,fontWeight:700,color:"#4F5BD5",marginBottom:8}}>Quick: Set Unit 1 start Monday, auto-fill all 33 weeks</div>
          <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
            <input type="date" value={startDate} onChange={e=>setStart(e.target.value)} style={{padding:"6px 12px",borderRadius:8,border:"2px solid #E0E0E8",fontSize:13}}/>
            <button onClick={autoFill} disabled={!startDate} style={{padding:"6px 16px",borderRadius:8,border:"none",background:startDate?"#4F5BD5":"#ccc",color:"#fff",fontSize:12,fontWeight:700,cursor:startDate?"pointer":"default"}}>Auto-fill</button>
          </div>
        </div>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{borderBottom:"2px solid #EEEEF2"}}><th style={{padding:"6px",textAlign:"left",color:"#888",fontWeight:700}}>School Week</th><th style={{padding:"6px",textAlign:"center",color:"#888"}}>Monday</th><th style={{padding:"6px",textAlign:"center",color:"#888",width:50}}>Active</th></tr></thead>
          <tbody>{lc.map((c,i)=>{const isUnit=c.label.includes("\u5B66\u524D\u590D\u4E60");return <tr key={i} style={{borderBottom:"1px solid #F5F5F8",background:isUnit?"#FAFAFF":"#fff",opacity:c.active?1:0.5}}><td style={{padding:"5px",fontWeight:isUnit?700:400,color:isUnit?"#4F5BD5":"#444",fontSize:11}}>{c.label}</td><td style={{padding:"5px",textAlign:"center"}}><input type="date" value={c.mondayDate||""} onChange={e=>setLc(p=>p.map((x,j)=>j===i?{...x,mondayDate:e.target.value}:x))} style={{padding:"3px 6px",borderRadius:6,border:"1.5px solid #E0E0E8",fontSize:11,width:130}}/></td><td style={{padding:"5px",textAlign:"center"}}><input type="checkbox" checked={c.active!==false} onChange={()=>setLc(p=>p.map((x,j)=>j===i?{...x,active:!x.active}:x))} style={{width:16,height:16,cursor:"pointer"}}/></td></tr>})}</tbody>
        </table>
        <div style={{display:"flex",gap:10,marginTop:20,justifyContent:"flex-end"}}>
          <button onClick={onClose} style={{padding:"10px 20px",borderRadius:10,border:"2px solid #E0E0E8",background:"#fff",fontSize:14,fontWeight:700,color:"#666",cursor:"pointer"}}>Cancel</button>
          <button onClick={save} disabled={saving} style={{padding:"10px 24px",borderRadius:10,border:"none",background:"#4F5BD5",fontSize:14,fontWeight:700,color:"#fff",cursor:"pointer"}}>{saving?"Saving...":"\uD83D\uDCBE Save"}</button>
        </div>
      </div>
    </div>
  </div>;
}

/* ════════ ALERTS PANEL ════════ */
function AlertsPanel({students,records,cal}){
  const all=useMemo(()=>{const r=[];for(const s of students.filter(s=>s.visible)){const a=getAlerts(s.name,records,cal);if(a.length>0)r.push({s,a,h:topAlert(a)})}r.sort((a,b)=>{const o={purple:0,red:1,yellow:2};return(o[a.h]??9)-(o[b.h]??9)});return r},[students,records,cal]);
  if(all.length===0)return null;
  return <div style={{background:"#fff",borderRadius:16,border:"1px solid #EEEEF2",overflow:"hidden",marginBottom:24}}>
    <div style={{padding:"14px 24px",borderBottom:"1px solid #EEEEF2",background:"linear-gradient(135deg,#FFFBF0,#FFF5F5,#F8F0FF)",display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:18}}>\uD83D\uDEA8</span><span style={{fontSize:14,fontWeight:800}}>Alerts</span><span style={{fontSize:12,color:"#888"}}>{all.length} flagged</span></div>
    <div style={{maxHeight:200,overflowY:"auto"}}>{all.map(({s,a,h})=>{const al=AL[h];return <div key={s.name} style={{padding:"10px 24px",borderBottom:"1px solid #F5F5F8",display:"flex",alignItems:"center",gap:12,borderLeft:`4px solid ${al.bd}`,background:`${al.bg}40`}}><div style={{width:32,height:32,borderRadius:"50%",background:al.bg,border:`2px solid ${al.bd}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>{al.ic}</div><div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:13,fontWeight:700}}>{s.name}</span><AlertBadge level={h} compact/></div><div style={{fontSize:11,color:"#888",marginTop:1}}>{a.map(x=>x.msg).join(" \u00B7 ")}</div></div></div>})}</div>
  </div>;
}

const th={fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:"0.06em",padding:"12px 10px",textAlign:"center",whiteSpace:"nowrap"};
const td={fontFamily:"'DM Sans',sans-serif",fontSize:14,padding:"10px",textAlign:"center",verticalAlign:"middle"};

/* ════════ REPORT GENERATOR ════════ */
function genReport(student,records,type,cal,idx){
  const sr=records[student.name]||{};
  const fmt=d=>{try{return new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}catch(e){return d}};
  const fmtS=d=>{try{return new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}catch(e){return d}};
  let weeks=[],title="",period="";
  if(type==="weekly"){weeks=[cal[idx]];title=`Weekly: ${weeks[0]?.label||""}`}
  else if(type==="monthly"){const st=Math.max(0,idx-3);weeks=cal.slice(st,idx+1).filter(w=>w.mondayDate&&w.active);title="Monthly (4 Weeks)"}
  else{const ui=Math.floor(idx/11)*11;weeks=cal.slice(ui,ui+11).filter(w=>w.mondayDate&&w.active);title=`Unit ${Math.floor(idx/11)+1} Report`}
  const wd=weeks.filter(w=>w.mondayDate).map(w=>{const ds=safeDates(w.mondayDate);let cd=0;const days=ds.map(day=>{const cats=sr[day]||{};const done=CATEGORIES.map(c=>!!cats[c]);const cnt=done.filter(Boolean).length;const ok=cnt>=3;if(ok)cd++;return{day,done,cnt,ok}});return{...w,ds,days,cd,wk:cd>=4}});
  if(wd.length>0){const fd=wd[0].ds;const ld=wd[wd.length-1].ds;period=(fd.length&&ld.length)?`${fmt(fd[0])} \u2014 ${fmt(ld[4])}`:""}
  const tDays=wd.length*5,tComp=wd.reduce((s,w)=>s+w.cd,0),tWk=wd.length,cWk=wd.filter(w=>w.wk).length;
  const catS=CATEGORIES.map(cat=>{let d=0,t=0;wd.forEach(w=>w.days.forEach(x=>{t++;if(x.done[CATEGORIES.indexOf(cat)])d++}));return{cat,d,t,p:t>0?Math.round(d/t*100):0}});
  const chk=v=>v?'<span style="display:inline-block;width:22px;height:22px;border-radius:5px;background:#38A169;color:#fff;text-align:center;line-height:22px;font-size:11px">\u2713</span>':'<span style="display:inline-block;width:22px;height:22px;border-radius:5px;background:#F0F0F5;color:#ccc;text-align:center;line-height:22px;font-size:11px">\u2014</span>';
  const pill=(ok,l)=>`<span style="padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:${ok?'#E8F8EE':'#FFF3E6'};color:${ok?'#1B7A3D':'#B8600A'}">${l}</span>`;
  const bar=(p,co)=>`<div style="display:flex;align-items:center;gap:8px"><div style="flex:1;height:7px;background:#F0F0F5;border-radius:4px;overflow:hidden"><div style="width:${p}%;height:100%;background:${co};border-radius:4px"></div></div><span style="font-size:11px;font-weight:700;color:${co};min-width:32px;text-align:right">${p}%</span></div>`;
  let grids="";wd.forEach(w=>{grids+=`<div style="page-break-inside:avoid;margin-bottom:14px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px;font-weight:700;color:#444">${w.label}</span>${pill(w.wk,w.wk?'PASS '+w.cd+'/5':w.cd+'/5')}</div><table style="width:100%;border-collapse:collapse;font-size:11px"><tr style="background:#FAFAFD"><th style="padding:5px;text-align:left;color:#888;font-weight:700;border-bottom:2px solid #EEEEF2">Day</th>${CATEGORIES.map(c=>`<th style="padding:5px;text-align:center;color:${CAT_COLORS[c].on};font-weight:700;border-bottom:2px solid #EEEEF2">${c}</th>`).join('')}<th style="padding:5px;text-align:center;color:#888;border-bottom:2px solid #EEEEF2">Status</th></tr>${w.days.map((d,di)=>`<tr style="border-bottom:1px solid #F5F5F8"><td style="padding:4px 6px;font-weight:600;font-size:11px">${WKDAYS[di]} <span style="color:#bbb;font-size:10px">${fmtS(d.day)}</span></td>${CATEGORIES.map((cat,ci)=>`<td style="padding:4px;text-align:center">${chk(d.done[ci])}</td>`).join('')}<td style="text-align:center">${pill(d.ok,d.cnt+'/4')}</td></tr>`).join('')}</table></div>`});
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${student.name} \u2014 ${title}</title><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'DM Sans',sans-serif;padding:36px;color:#333;max-width:780px;margin:0 auto;-webkit-print-color-adjust:exact;print-color-adjust:exact}@media print{body{padding:16px}@page{size:A4;margin:12mm}.pb{display:none!important}}h1{font-family:'Playfair Display',serif;font-size:22px;font-weight:800;color:#1A1A2E}.hdr{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid #EEEEF2}.av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#4F5BD5,#7B68EE);display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Playfair Display',serif;font-size:18px;font-weight:800}.ig{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}.ib{background:#FAFAFD;border:1px solid #EEEEF2;border-radius:8px;padding:8px 12px}.il{font-size:9px;font-weight:700;color:#888;text-transform:uppercase}.iv{font-size:13px;font-weight:700;color:#1A1A2E;margin-top:1px}.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}.sb{background:#fff;border:1px solid #EEEEF2;border-radius:8px;padding:10px;text-align:center}.sv{font-family:'Playfair Display',serif;font-size:22px;font-weight:800}.sl{font-size:9px;font-weight:700;color:#888;text-transform:uppercase;margin-top:1px}.st{font-size:12px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;padding-top:6px}.cg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}.cb{background:#fff;border:1px solid #EEEEF2;border-radius:8px;padding:10px}.cn{font-size:11px;font-weight:700;margin-bottom:4px}.pb{position:fixed;bottom:20px;right:20px;padding:10px 20px;border-radius:10px;border:none;background:linear-gradient(135deg,#4F5BD5,#7B68EE);color:#fff;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(79,91,213,0.3);z-index:100}.ft{margin-top:20px;padding-top:10px;border-top:1px solid #EEEEF2;text-align:center;font-size:10px;color:#bbb}</style></head><body>
  <button class="pb" onclick="window.print()">\uD83D\uDCC4 Save as PDF</button>
  <div class="hdr"><div class="av">${student.name.charAt(0)}</div><div><h1>${student.name}</h1><div style="font-size:12px;color:#888;margin-top:2px">${title} \u00B7 ${period}</div></div></div>
  <div class="ig"><div class="ib"><div class="il">\uD83C\uDFEB School</div><div class="iv">${student.school}</div></div><div class="ib"><div class="il">\uD83C\uDF93 Grade</div><div class="iv">${student.grade}</div></div><div class="ib"><div class="il">\u03A3 Math</div><div class="iv">${student.mathLevel}</div></div><div class="ib"><div class="il">\u5B57 Chinese</div><div class="iv">${student.chineseLevel}</div></div></div>
  <div class="sg"><div class="sb"><div class="sv" style="color:#4F5BD5">${tComp}/${tDays}</div><div class="sl">Days</div></div><div class="sb"><div class="sv" style="color:#38A169">${cWk}/${tWk}</div><div class="sl">Weeks</div></div><div class="sb"><div class="sv" style="color:#D5944F">${tDays>0?Math.round(tComp/tDays*100):0}%</div><div class="sl">Day Rate</div></div><div class="sb"><div class="sv" style="color:${cWk>=Math.ceil(tWk*.8)?'#38A169':'#D5564F'}">${tWk>0?Math.round(cWk/tWk*100):0}%</div><div class="sl">Week Rate</div></div></div>
  <div class="st">Categories</div><div class="cg">${catS.map(cs=>`<div class="cb"><div class="cn" style="color:${CAT_COLORS[cs.cat].on}">${CAT_ICONS[cs.cat]} ${cs.cat}</div>${bar(cs.p,CAT_COLORS[cs.cat].on)}<div style="font-size:10px;color:#888;margin-top:3px">${cs.d}/${cs.t}</div></div>`).join('')}</div>
  <div class="st">Detail</div>${grids}
  <div class="ft">\uD83D\uDCDA Assignment Tracker \u00B7 Generated ${new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}</div>
  </body></html>`;
  const w=window.open('','_blank');w.document.write(html);w.document.close();
}

/* ════════ MAIN PAGE ════════ */
function MainPage({students,records,cal,wi,setWi,onToggle,onSelect,onRefresh,onCal}){
  const today=getDayKey();const cw=cal[wi];const wd=safeDates(cw?.mondayDate);
  const [sel,setSel]=useState(today);const [showH,setShowH]=useState(false);
  useEffect(()=>{wd.length>0?(wd.includes(today)?setSel(today):setSel(wd[0])):setSel(today)},[wi]);
  const vis=students.filter(s=>s.visible),hid=students.filter(s=>!s.visible);
  const isCU=sel!==today&&sel<today;
  return <div className="app-content">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:28,flexWrap:"wrap",gap:16}}>
      <div><h1 style={{fontFamily:"'Playfair Display',serif",fontSize:32,fontWeight:800,color:"#1A1A2E"}}>\uD83D\uDCDA Assignment Tracker</h1><p style={{fontSize:14,color:"#888",margin:"6px 0 0"}}>{new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}</p></div>
      <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:10}}>
        <WeekNav cal={cal} idx={wi} setIdx={setWi} onSetup={onCal}/>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onRefresh} style={{padding:"9px 18px",borderRadius:10,border:"2px solid #4F5BD5",background:"#EEF0FF",color:"#4F5BD5",fontSize:13,fontWeight:700,cursor:"pointer"}}>\uD83D\uDD04 Refresh</button>
          {hid.length>0&&<button onClick={()=>setShowH(!showH)} style={{padding:"9px 18px",borderRadius:10,border:"2px solid #E0E0E8",background:"#fff",color:"#666",fontSize:13,fontWeight:700,cursor:"pointer"}}>{hid.length} Hidden</button>}
        </div>
      </div>
    </div>
    {cw&&<div style={{background:"#fff",borderRadius:12,border:"1px solid #EEEEF2",padding:"10px 20px",marginBottom:16,display:"flex",alignItems:"center",gap:12}}><span style={{fontSize:16}}>\uD83D\uDDD3</span><span style={{fontSize:15,fontWeight:700,color:"#1A1A2E"}}>{cw.label}</span>{wd.length>0&&<span style={{fontSize:12,color:"#888"}}>{new Date(wd[0]+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})} \u2014 {new Date(wd[4]+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>}{!cw.mondayDate&&<span style={{fontSize:12,color:"#D5564F",fontWeight:700}}>\u26A0\uFE0F No date \u2014 use Calendar Setup</span>}</div>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12,marginBottom:24}}>
      {[{l:"Active",v:vis.length,c:"#4F5BD5",i:"\uD83D\uDC65"},{l:"Hidden",v:hid.length,c:"#B8600A",i:"\uD83D\uDC41\u200D\uD83D\uDDE8"},{l:"Today",v:vis.filter(s=>isDayDone(records[s.name]?.[today])).length,c:"#38A169",i:"\u2705",m:vis.length},{l:"Week",v:wd.length>0?vis.filter(s=>countDone(records[s.name],wd)>=4).length:0,c:"#D5944F",i:"\uD83C\uDFC6",m:vis.length}].map(st=><div key={st.l} style={{background:"#fff",borderRadius:14,padding:"14px 18px",border:"1px solid #EEEEF2"}}><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:18}}>{st.i}</span><span style={{fontSize:11,color:"#888",fontWeight:700,textTransform:"uppercase"}}>{st.l}</span></div><div style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:800,color:st.c,marginTop:2}}>{st.v}{st.m!=null&&<span style={{fontSize:13,color:"#bbb",fontWeight:400,fontFamily:"'DM Sans',sans-serif"}}>/{st.m}</span>}</div></div>)}
    </div>
    <AlertsPanel students={students} records={records} cal={cal}/>
    {wd.length>0&&<DayPicker wd={wd} sel={sel} setSel={setSel}/>}
    {wd.length>0&&<div style={{background:"#fff",borderRadius:16,border:isCU?"2px solid #FFE0B2":"1px solid #EEEEF2",overflow:"hidden"}}>
      <div style={{padding:"14px 24px",borderBottom:"1px solid #EEEEF2",background:isCU?"linear-gradient(135deg,#FFF8EE,#FFFBF5)":"#FAFAFD",display:"flex",justifyContent:"space-between"}}><span style={{fontSize:13,fontWeight:700,color:isCU?"#B8600A":"#666",textTransform:"uppercase"}}>{cw?.label||"Check-in"}</span><span style={{fontSize:12,color:"#aaa"}}>{vis.length} active \u00B7 \u2601\uFE0F Sheets</span></div>
      <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr style={{borderBottom:"2px solid #EEEEF2"}}><th style={th}>#</th><th style={{...th,textAlign:"left"}}>Student</th>{CATEGORIES.map(c=><th key={c} style={th}><span style={{color:CAT_COLORS[c].on}}>{CAT_ICONS[c]}</span> {c}</th>)}<th style={th}>Day</th><th style={th}>Week</th></tr></thead>
        <tbody>{vis.map((s,i)=>{const ck=CATEGORIES.filter(c=>!!records[s.name]?.[sel]?.[c]).length;const wdn=countDone(records[s.name],wd);const al=getAlerts(s.name,records,cal);const h=topAlert(al);const ai=AL[h];const ha=h!=="none";
          return <tr key={s.name} style={{borderBottom:"1px solid #F5F5F8",background:ha?`${ai.bg}30`:(i%2===0?"#fff":"#FCFCFE"),borderLeft:ha?`4px solid ${ai.bd}`:"4px solid transparent"}}><td style={{...td,color:"#bbb",fontWeight:600,width:40}}>{i+1}</td><td style={{...td,textAlign:"left"}}><div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}><button onClick={()=>onSelect(s)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,fontWeight:700,color:"#1A1A2E",padding:0,borderBottom:"2px solid transparent"}} onMouseEnter={e=>{e.target.style.color="#4F5BD5";e.target.style.borderBottomColor="#4F5BD5"}} onMouseLeave={e=>{e.target.style.color="#1A1A2E";e.target.style.borderBottomColor="transparent"}}>{s.name}</button>{ha&&<AlertBadge level={h} compact/>}</div><div style={{fontSize:11,color:"#aaa",marginTop:1}}>{s.school} \u00B7 {s.grade}</div></td>
            {CATEGORIES.map(c=><td key={c} style={td}><CatBtn cat={c} on={!!records[s.name]?.[sel]?.[c]} toggle={()=>onToggle(s.name,sel,c)}/></td>)}
            <td style={td}><Badge ok={ck>=3} label={`${ck}/4`}/></td><td style={td}><Badge ok={wdn>=4} label={`${wdn}/5`}/></td></tr>})}
          {showH&&hid.length>0&&<><tr><td colSpan={8} style={{padding:"10px 24px",background:"#FFF8EE",fontSize:12,fontWeight:700,color:"#B8600A",textTransform:"uppercase",borderTop:"2px dashed #FFE0B2"}}>Hidden</td></tr>{hid.map((s,i)=><tr key={s.name} style={{borderBottom:"1px solid #F5F5F8",opacity:0.5}}><td style={{...td,color:"#bbb"}}>{i+1}</td><td style={{...td,textAlign:"left"}}><span style={{textDecoration:"line-through",color:"#999"}}>{s.name}</span></td>{CATEGORIES.map(c=><td key={c} style={td}>\u2014</td>)}<td style={td}>\u2014</td><td style={td}>\u2014</td></tr>)}</>}
        </tbody></table></div>
    </div>}
    <div style={{display:"flex",justifyContent:"center",marginTop:18,padding:"14px 20px",background:"#fff",borderRadius:12,border:"1px solid #EEEEF2"}}><span style={{fontSize:11,color:"#666"}}>3/4 = \u2705 day \u00B7 4/5 = \u2705 week \u00B7 \uD83D\uDCC5 Catch up \u00B7 \u2601\uFE0F Auto-synced</span></div>
  </div>;
}

/* ════════ STUDENT PAGE ════════ */
function StudentPage({student,records,cal,wi,setWi,onToggle,onBack,onCal}){
  const today=getDayKey();const cw=cal[wi];const wd=safeDates(cw?.mondayDate);
  const [sel,setSel]=useState(today);
  useEffect(()=>{wd.length>0?(wd.includes(today)?setSel(today):setSel(wd[0])):setSel(today)},[wi]);
  const alerts=useMemo(()=>getAlerts(student.name,records,cal),[student.name,records,cal]);
  const isCU=sel!==today&&sel<today;
  const sr=records[student.name]||{};

  const weeksSummary=useMemo(()=>{
    const st=Math.max(0,wi-3);
    return cal.slice(st,wi+1).filter(w=>w.mondayDate&&w.active).map(w=>{
      const ds=safeDates(w.mondayDate);let cd=0;
      const dd=ds.map(day=>{const cats=sr[day]||{};const done=CATEGORIES.map(c=>!!cats[c]);const cnt=done.filter(Boolean).length;const ok=cnt>=3;if(ok)cd++;return{day,done,cnt,ok}});
      return{...w,ds,dd,cd,wk:cd>=4};
    });
  },[student.name,records,wi,cal]);

  const cwData=weeksSummary.find(w=>w.mondayDate===cw?.mondayDate)||{dd:[],cd:0,wk:false};
  const allDays=Object.keys(sr);const tt=allDays.length;const tc=allDays.filter(d=>isDayDone(sr[d])).length;

  return <div className="app-content">
    <button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,fontWeight:600,color:"#4F5BD5",padding:0,marginBottom:16}}>\u25C2 Back</button>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:16}}>
      <div style={{display:"flex",alignItems:"center",gap:16}}>
        <div style={{width:56,height:56,borderRadius:"50%",background:"linear-gradient(135deg,#4F5BD5,#7B68EE)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:800}}>{student.name.charAt(0)}</div>
        <div><div style={{display:"flex",alignItems:"center",gap:10}}><h2 style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:800,color:"#1A1A2E",margin:0}}>{student.name}</h2>{alerts.length>0&&<AlertBadge level={topAlert(alerts)}/>}</div><p style={{fontSize:13,color:"#888",margin:"2px 0 0"}}>{student.school} \u00B7 Grade {student.grade}</p></div>
      </div>
      <WeekNav cal={cal} idx={wi} setIdx={setWi} onSetup={onCal}/>
    </div>

    {alerts.length>0&&<div style={{background:AL[topAlert(alerts)].bg,border:`2px solid ${AL[topAlert(alerts)].bd}`,borderRadius:14,padding:"16px 20px",marginBottom:20}}><div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:22}}>{AL[topAlert(alerts)].ic}</span><span style={{fontSize:14,fontWeight:800,color:AL[topAlert(alerts)].c,textTransform:"uppercase"}}>{AL[topAlert(alerts)].lb} \u2014 {student.name}</span></div>{alerts.map((a,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,marginTop:4,paddingLeft:32}}><span style={{fontSize:10}}>{AL[a.level].ic}</span><span style={{fontSize:13,color:AL[a.level].c,fontWeight:600}}>{a.msg}</span></div>)}</div>}

    {cw&&<div style={{background:"#fff",borderRadius:12,border:"1px solid #EEEEF2",padding:"10px 20px",marginBottom:16,display:"flex",alignItems:"center",gap:12}}><span style={{fontSize:16}}>\uD83D\uDDD3</span><span style={{fontSize:15,fontWeight:700,color:"#1A1A2E"}}>{cw.label}</span></div>}

    <div style={{background:"#fff",borderRadius:14,padding:"18px 22px",border:"1px solid #EEEEF2",marginBottom:20,display:"flex",flexWrap:"wrap",gap:24}}>
      {[{l:"School",v:student.school,i:"\uD83C\uDFEB"},{l:"Grade",v:student.grade,i:"\uD83C\uDF93"},{l:"Math",v:student.mathLevel,i:"\u03A3"},{l:"Chinese",v:student.chineseLevel,i:"\u5B57"}].map(x=><div key={x.l} style={{flex:"1 1 140px"}}><div style={{fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase"}}>{x.i} {x.l}</div><div style={{fontSize:15,fontWeight:700,color:"#1A1A2E",marginTop:2}}>{x.v}</div></div>)}
    </div>

    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:24}}>
      {[{l:"This Week",v:`${cwData.cd}/5`,d:cwData.wk,c:"#4F5BD5"},{l:"Tracked",v:tt,d:null,c:"#666"},{l:"Completed",v:tc,d:null,c:"#38A169"},{l:"Rate",v:tt>0?Math.round(tc/tt*100)+"%":"\u2014",d:null,c:"#D5944F"}].map(s=><div key={s.l} style={{background:"#fff",borderRadius:14,padding:"14px 16px",border:"1px solid #EEEEF2"}}><div style={{fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase"}}>{s.l}</div><div style={{display:"flex",alignItems:"center",gap:6,marginTop:3}}><span style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:800,color:s.c}}>{s.v}</span>{s.d!=null&&<Badge ok={s.d} label={s.d?"PASS":"IN PROGRESS"}/>}</div></div>)}
    </div>

    {/* Reports */}
    <div style={{background:"#fff",borderRadius:16,border:"1px solid #EEEEF2",padding:"18px 24px",marginBottom:24}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:18}}>\uD83D\uDCC4</span><span style={{fontSize:14,fontWeight:700,color:"#666",textTransform:"uppercase"}}>Reports</span></div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button onClick={()=>genReport(student,records,"weekly",cal,wi)} style={{padding:"9px 18px",borderRadius:10,border:"2px solid #4F5BD5",background:"#EEF0FF",color:"#4F5BD5",fontSize:13,fontWeight:700,cursor:"pointer"}}>\uD83D\uDCCB Weekly</button>
          <button onClick={()=>genReport(student,records,"monthly",cal,wi)} style={{padding:"9px 18px",borderRadius:10,border:"2px solid #38A169",background:"#E8F8EE",color:"#1B7A3D",fontSize:13,fontWeight:700,cursor:"pointer"}}>\uD83D\uDCCA Monthly</button>
          <button onClick={()=>genReport(student,records,"unit",cal,wi)} style={{padding:"9px 18px",borderRadius:10,border:"2px solid #D5944F",background:"#FFF8EE",color:"#B8600A",fontSize:13,fontWeight:700,cursor:"pointer"}}>\uD83D\uDCD1 Unit</button>
        </div>
      </div>
    </div>

    {wd.length>0&&<DayPicker wd={wd} sel={sel} setSel={setSel} label="Edit check-in:"/>}

    {cwData.dd.length>0&&<div style={{background:"#fff",borderRadius:16,border:isCU?"2px solid #FFE0B2":"1px solid #EEEEF2",padding:24,marginBottom:24}}>
      <h3 style={{fontSize:14,fontWeight:700,color:"#666",textTransform:"uppercase",margin:"0 0 16px"}}>{cw?.label} \u2014 {cwData.wk?"\u2705 Done":`${cwData.cd}/5 (need 4)`}</h3>
      <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr><th style={th}>Day</th>{CATEGORIES.map(c=><th key={c} style={th}><span style={{color:CAT_COLORS[c].on}}>{CAT_ICONS[c]}</span> {c}</th>)}<th style={th}>Status</th></tr></thead>
        <tbody>{cwData.dd.map((dd,i)=>{const isT=dd.day===today;const isE=dd.day===sel;
          return <tr key={dd.day} onClick={()=>setSel(dd.day)} style={{borderBottom:"1px solid #F5F5F8",background:isE?(isCU?"#FFF8EE":"#F0F0FF"):(isT?"#F5F5FF":(i%2===0?"#fff":"#FCFCFE")),cursor:"pointer",borderLeft:isE?`4px solid ${isCU?"#D5944F":"#4F5BD5"}`:"4px solid transparent"}}>
            <td style={{...td,fontWeight:700,textAlign:"left",color:isE?(isCU?"#B8600A":"#4F5BD5"):(isT?"#4F5BD5":"#444")}}>{WKDAYS[i]}<span style={{fontWeight:400,color:"#bbb",marginLeft:6,fontSize:12}}>{new Date(dd.day+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>{isT&&<span style={{marginLeft:8,fontSize:9,fontWeight:800,color:"#4F5BD5",background:"#EEF0FF",padding:"2px 6px",borderRadius:4}}>TODAY</span>}{isE&&!isT&&<span style={{marginLeft:8,fontSize:9,fontWeight:800,color:"#B8600A",background:"#FFF3E6",padding:"2px 6px",borderRadius:4}}>EDITING</span>}</td>
            {CATEGORIES.map((c,ci)=><td key={c} style={td}>{isE?<CatBtn cat={c} on={dd.done[ci]} toggle={()=>onToggle(student.name,dd.day,c)} sm/>:<span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:32,height:32,borderRadius:8,background:dd.done[ci]?CAT_COLORS[c].on:"#F5F5F8",color:dd.done[ci]?"#fff":"#ccc",fontSize:14,fontWeight:700}}>{dd.done[ci]?"\u2713":"\u2014"}</span>}</td>)}
            <td style={td}><Badge ok={dd.ok} label={`${dd.cnt}/4`}/></td>
          </tr>})}</tbody></table></div>
    </div>}

    {weeksSummary.length>0&&<div style={{background:"#fff",borderRadius:16,border:"1px solid #EEEEF2",padding:24}}>
      <h3 style={{fontSize:14,fontWeight:700,color:"#666",textTransform:"uppercase",margin:"0 0 16px"}}>Recent Progress</h3>
      <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
        {weeksSummary.map((ws,i)=>{const rc=ws.wk?"#38A169":"#E74C3C";const isCur=ws.mondayDate===cw?.mondayDate;return <div key={ws.mondayDate||i} style={{flex:"1 1 130px",minWidth:130,background:isCur?"#FAFAFF":"#FAFAFA",borderRadius:12,padding:14,border:isCur?"2px solid #4F5BD520":"1px solid #EEEEF2",textAlign:"center"}}>
          <div style={{fontSize:10,fontWeight:700,color:"#888",textTransform:"uppercase",marginBottom:6,lineHeight:1.3}}>{ws.label}</div>
          <div style={{position:"relative",display:"inline-block"}}><Ring v={ws.cd} max={5} color={rc}/><div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",fontSize:15,fontWeight:800,color:rc}}>{ws.cd}/5</div></div>
          <div style={{marginTop:6}}><Badge ok={ws.wk} label={ws.wk?"PASS":"INCOMPLETE"}/></div>
        </div>})}
      </div>
    </div>}
  </div>;
}

/* ════════ APP ════════ */
function App(){
  const [loading,setLoading]=useState(true);
  const [students,setStudents]=useState([]);
  const [records,setRecords]=useState({});
  const [cal,setCal]=useState(defaultCalendar());
  const [wi,setWi]=useState(0);
  const [selStu,setSelStu]=useState(null);
  const [calOpen,setCalOpen]=useState(false);
  const [sync,setSync]=useState(null);
  const st=useRef(null);

  const fetchData=useCallback(async(show)=>{
    if(show)setLoading(true);
    try{
      const [sr,cr,clr]=await Promise.all([apiGet("getStudents"),apiGet("getCheckIns"),apiGet("getCalendar")]);
      if(sr.students)setStudents(sr.students.map(s=>({...s,visible:(s.status||"Active").toLowerCase()!=="hidden"})));
      if(cr.checkIns)setRecords(cr.checkIns);
      if(clr.calendar&&clr.calendar.length>0){setCal(clr.calendar);setWi(findCurrentSchoolWeek(clr.calendar))}
    }catch(e){console.error("Fetch:",e)}
    setLoading(false);
  },[]);

  useEffect(()=>{fetchData(true)},[fetchData]);
  useEffect(()=>{const iv=setInterval(()=>fetchData(false),30000);return()=>clearInterval(iv)},[fetchData]);

  const toggle=useCallback(async(name,date,cat)=>{
    setRecords(p=>{const n={...p};if(!n[name])n[name]={};if(!n[name][date])n[name][date]={};n[name][date][cat]=!n[name][date][cat];return n});
    setSync("saving");
    try{const cv=records[name]?.[date]?.[cat];await apiPost({action:"toggleCheckIn",studentName:name,date,category:cat,checked:!cv});setSync("saved")}catch(e){setSync("error")}
    if(st.current)clearTimeout(st.current);st.current=setTimeout(()=>setSync(null),2000);
  },[records]);

  const calSave=nc=>{setCal(nc);setWi(findCurrentSchoolWeek(nc))};

  if(loading)return <div className="container"><div style={{display:"flex",justifyContent:"space-between",marginBottom:28}}><div><div className="skeleton" style={{height:32,width:300,marginBottom:6}}/><div className="skeleton" style={{height:16,width:220}}/></div></div><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12,marginBottom:24}}><div className="skeleton" style={{height:80,borderRadius:14}}/><div className="skeleton" style={{height:80,borderRadius:14}}/><div className="skeleton" style={{height:80,borderRadius:14}}/><div className="skeleton" style={{height:80,borderRadius:14}}/></div><div className="skeleton" style={{height:64,borderRadius:14,marginBottom:20}}/><div className="skeleton" style={{height:400,borderRadius:16}}/></div>;

  return <div className="container">
    <SyncBadge s={sync}/>
    {selStu?<StudentPage student={selStu} records={records} cal={cal} wi={wi} setWi={setWi} onToggle={toggle} onBack={()=>setSelStu(null)} onCal={()=>setCalOpen(true)}/>:
    <MainPage students={students} records={records} cal={cal} wi={wi} setWi={setWi} onToggle={toggle} onSelect={setSelStu} onRefresh={()=>fetchData(false)} onCal={()=>setCalOpen(true)}/>}
    <CalModal open={calOpen} onClose={()=>setCalOpen(false)} cal={cal} onSave={calSave}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
